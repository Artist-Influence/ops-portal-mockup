<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artist Influence · Spotify Ops Portal (Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<!-- Clash Display via Fontshare for mockup fidelity. PRODUCTION: self-host the woff2s per the design system (do not CDN). -->
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   ARTIST INFLUENCE — Design tokens (lifted from production CSS)
   ============================================================ */
:root{
  --ai-red:0 84% 54%;
  --ai-red-deep:355 80% 22%;
  --ai-bg:225 18% 6%;
  --ai-success:158 64% 44%;
  --ai-amber:42 100% 67%;
  --ai-blue:208 90% 60%;
  --surface-1:225 14% 8%;
  --surface-2:225 14% 11%;
  --surface-3:225 14% 14%;
  --hairline:225 12% 26%;
  --text-primary:40 10% 96%;
  --text-secondary:0 0% 97%;
  --text-tertiary:0 0% 88%;
  --radius:0.75rem;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --ease-reveal:cubic-bezier(0.22,1,0.36,1);
  --font-display:'Helvetica Neue',Helvetica,Arial,'Inter',sans-serif; /* matches live site (Helvetica Neue trial); swap to 'Clash Display' first to restore brand face */
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --gradient-kinetic:radial-gradient(ellipse 120% 60% at 0% 20%, hsl(var(--ai-red-deep)/0.18) 0%, transparent 60%),
                     radial-gradient(ellipse 120% 60% at 100% 80%, hsl(var(--ai-red-deep)/0.12) 0%, transparent 60%);
  --shadow-card:0 1px 0 hsl(var(--text-primary)/0.04) inset, 0 12px 32px hsl(225 18% 2%/0.5);
  --shadow-glow:0 0 28px hsl(var(--ai-red)/0.10);
  --shadow-glow-hover:0 0 36px hsl(var(--ai-red)/0.18);
  --shadow-button:inset 0 1px 0 hsl(var(--text-primary)/0.10), 0 6px 14px hsl(var(--ai-red)/0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--gradient-kinetic), hsl(var(--ai-bg));background-attachment:fixed;color:hsl(var(--text-primary));-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:"ss01","cv11","kern";line-height:1.5;min-height:100vh;}
::selection{background:hsl(var(--ai-red)/0.35);color:hsl(var(--text-primary));}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:hsl(var(--hairline)/0.6);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:hsl(var(--hairline));background-clip:padding-box;}
h1,h2{font-family:var(--font-display);font-weight:700;line-height:1.04;letter-spacing:-0.022em;text-wrap:balance;}
h3,h4,h5,h6{font-family:var(--font-display);font-weight:600;line-height:1.2;letter-spacing:-0.012em;}
.font-display{font-family:var(--font-display);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.mono{font-family:var(--font-mono);font-feature-settings:"tnum","ss01";letter-spacing:-0.01em;}
.eyebrow{font-family:var(--font-body);font-size:0.75rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:hsl(var(--ai-red));}
/* eyebrow stacked above a heading */
.eyebrow-sm{font-family:var(--font-body);font-size:0.625rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:hsl(var(--ai-red));display:block;margin-bottom:5px;}
.muted{color:hsl(var(--text-tertiary));}
.sec{color:hsl(var(--text-secondary));}

.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}
.sidebar{position:sticky;top:0;height:100vh;background:hsl(var(--surface-1)/0.7);backdrop-filter:blur(14px) saturate(140%);border-right:1px solid hsl(var(--hairline)/0.5);display:flex;flex-direction:column;padding:22px 16px;gap:6px;}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:hsl(var(--ai-red));display:grid;place-items:center;font-weight:800;font-size:16px;color:#fff;box-shadow:0 6px 14px hsl(var(--ai-red)/0.35);}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:15px;letter-spacing:-0.01em;line-height:1.1;}
.brand-sub{font-size:11px;color:hsl(var(--text-tertiary));letter-spacing:0.02em;}
.nav-label{font-size:0.625rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:hsl(var(--text-tertiary));padding:14px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:hsl(var(--text-secondary));font-size:13.5px;font-weight:500;transition:background .18s var(--ease),color .18s var(--ease);position:relative;}
.nav-item:hover{background:hsl(var(--surface-3)/0.7);color:hsl(var(--text-primary));}
.nav-item.active{background:hsl(var(--ai-red)/0.12);color:hsl(var(--text-primary));}
.nav-item.active::before{content:"";position:absolute;left:-16px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:hsl(var(--ai-red));}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.9;}
.nav-badge{margin-left:auto;font-size:11px;font-weight:700;min-width:19px;height:19px;padding:0 6px;border-radius:99px;display:grid;place-items:center;background:hsl(var(--ai-red));color:#fff;}
.nav-badge.amber{background:hsl(var(--ai-amber));color:#1a1500;}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid hsl(var(--hairline)/0.4);}
.vendor-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;transition:background .18s;}
.vendor-chip:hover{background:hsl(var(--surface-3)/0.7);}
.avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(145deg,hsl(var(--ai-red)/0.9),hsl(355 80% 38%));display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:none;}
.vendor-chip .nm{font-size:12.5px;font-weight:600;line-height:1.2;}
.vendor-chip .rl{font-size:11px;color:hsl(var(--text-tertiary));}

.main{min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;padding:16px 32px;background:hsl(var(--ai-bg)/0.72);backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid hsl(var(--hairline)/0.4);}
.page-title{font-family:var(--font-display);font-size:20px;font-weight:600;letter-spacing:-0.014em;}
.page-sub{font-size:12.5px;color:hsl(var(--text-tertiary));margin-top:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.payout-chip{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:99px;background:hsl(var(--ai-success)/0.12);border:1px solid hsl(var(--ai-success)/0.3);font-size:12.5px;font-weight:600;color:hsl(var(--ai-success));}
.payout-chip svg{width:14px;height:14px;}
.icon-btn{position:relative;width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:hsl(var(--surface-2)/0.8);border:1px solid hsl(var(--hairline)/0.5);transition:.18s;}
.icon-btn:hover{border-color:hsl(var(--ai-red)/0.4);background:hsl(var(--surface-3));}
.icon-btn svg{width:18px;height:18px;}
.icon-btn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:99px;background:hsl(var(--ai-red));border:2px solid hsl(var(--ai-bg));}
.content{padding:28px 32px 64px;max-width:1300px;width:100%;}

.card{background:hsl(var(--surface-1)/0.6);border:1px solid hsl(var(--hairline)/0.6);border-radius:var(--radius);box-shadow:var(--shadow-card);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);transition:border-color .3s var(--ease),box-shadow .3s var(--ease),transform .3s var(--ease);}
.card.interactive{cursor:pointer;}
.card.interactive:hover{border-color:hsl(var(--ai-red)/0.35);box-shadow:inset 0 1px 0 hsl(var(--text-primary)/0.06),0 16px 40px hsl(225 18% 2%/0.55),var(--shadow-glow-hover);transform:translateY(-2px);}
.hairline{height:1px;background:linear-gradient(90deg,transparent,hsl(var(--hairline)/0.5) 15%,hsl(var(--hairline)/0.5) 85%,transparent);}

.btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 15px;border-radius:var(--radius);font-size:13px;font-weight:600;transition:all .3s var(--ease);white-space:nowrap;}
.btn svg{width:15px;height:15px;}
.btn:active{transform:translateY(1px) scale(.97);transition-duration:.1s;}
.btn-primary{background:hsl(var(--ai-red));color:#fff;border:1px solid hsl(var(--text-primary)/0.10);box-shadow:var(--shadow-button);}
.btn-primary:hover{background:hsl(var(--ai-red)/0.95);transform:translateY(-2px);box-shadow:var(--shadow-button),var(--shadow-glow-hover);}
.btn-primary::after{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,hsl(0 0% 100%/0.28) 50%,transparent 65%);transform:translateX(-120%);pointer-events:none;}
.btn-primary:hover::after{transform:translateX(120%);transition:transform .55s var(--ease);}
.btn-ghost{background:hsl(var(--surface-2)/0.8);color:hsl(var(--text-primary));border:1px solid hsl(var(--hairline)/0.6);backdrop-filter:blur(6px);}
.btn-ghost:hover{border-color:hsl(var(--ai-red)/0.5);color:hsl(var(--ai-red));}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-block{width:100%;}

.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;}
.pill .pdot{width:6px;height:6px;border-radius:99px;background:currentColor;}
.pill.green{background:hsl(var(--ai-success)/0.13);color:hsl(var(--ai-success));}
.pill.amber{background:hsl(var(--ai-amber)/0.14);color:hsl(var(--ai-amber));}
.pill.red{background:hsl(var(--ai-red)/0.14);color:hsl(0 84% 66%);}
.pill.blue{background:hsl(var(--ai-blue)/0.14);color:hsl(var(--ai-blue));}
.pill.gray{background:hsl(var(--surface-3));color:hsl(var(--text-tertiary));}
.tier{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.tier.t1{background:linear-gradient(145deg,hsl(42 100% 67%/0.16),hsl(42 100% 67%/0.06));color:hsl(var(--ai-amber));border:1px solid hsl(var(--ai-amber)/0.3);}
.tier.std{background:hsl(var(--surface-3));color:hsl(var(--text-tertiary));border:1px solid hsl(var(--hairline)/0.5);}

.bar{height:7px;border-radius:99px;background:hsl(var(--surface-3));overflow:hidden;position:relative;}
.bar>span{position:absolute;left:0;top:0;bottom:0;border-radius:99px;}
.bar .fill-green{background:linear-gradient(90deg,hsl(var(--ai-success)/0.7),hsl(var(--ai-success)));}
.bar .fill-amber{background:linear-gradient(90deg,hsl(var(--ai-amber)/0.7),hsl(var(--ai-amber)));}
.bar .fill-red{background:linear-gradient(90deg,hsl(var(--ai-red)/0.7),hsl(var(--ai-red)));}
.bar .fill-blue{background:linear-gradient(90deg,hsl(var(--ai-blue)/0.7),hsl(var(--ai-blue)));}
.bar .pace-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:hsl(var(--text-primary)/0.55);}

.grid{display:grid;gap:18px;}
.g-2{grid-template-columns:repeat(2,1fr);}
.g-3{grid-template-columns:repeat(3,1fr);}
.g-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:1100px){.g-4{grid-template-columns:repeat(2,1fr);}.g-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:760px){.g-2,.g-3,.g-4{grid-template-columns:1fr;}}

.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:hsl(var(--text-tertiary));padding:11px 16px;border-bottom:1px solid hsl(var(--hairline)/0.5);}
.tbl tbody td{padding:13px 16px;border-bottom:1px solid hsl(var(--hairline)/0.28);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr.clickable{cursor:pointer;transition:background .15s;}
.tbl tbody tr.clickable:hover{background:hsl(var(--surface-2)/0.6);}

.stat-label{font-family:var(--font-body);font-size:0.6875rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:hsl(var(--ai-red));}
.stat-val{font-family:var(--font-mono);font-feature-settings:"tnum","ss01";font-size:27px;font-weight:600;letter-spacing:-0.02em;margin-top:5px;}
.sec-head{display:flex;align-items:flex-end;gap:12px;margin:32px 0 16px;}
.sec-head h2{font-size:16px;font-weight:600;letter-spacing:-0.012em;}
.sec-head h2[data-eyebrow]::before{content:attr(data-eyebrow);display:block;font-family:var(--font-body);font-size:0.625rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:hsl(var(--ai-red));margin-bottom:6px;}
.sec-head .count{font-size:12px;color:hsl(var(--text-tertiary));font-weight:500;}
.sec-head .line{flex:1;height:1px;background:hsl(var(--hairline)/0.35);}

.song-ttl{font-family:var(--font-display);font-weight:600;font-size:15.5px;letter-spacing:-0.012em;}
.song-art{font-size:12.5px;color:hsl(var(--text-tertiary));margin-top:1px;}
.cover{width:46px;height:46px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:700;color:#fff;font-size:15px;}
.song-link{display:inline-flex;align-items:center;gap:5px;transition:color .15s;}
.song-link:hover{color:hsl(141 76% 58%);}
.song-link svg{width:14px;height:14px;opacity:.65;}
.song-link:hover svg{opacity:1;color:hsl(141 76% 48%);}
.fol-link{cursor:pointer;border-bottom:1px dashed hsl(var(--hairline));padding-bottom:1px;transition:color .15s,border-color .15s;}
.fol-link:hover{color:hsl(var(--ai-success));border-color:hsl(var(--ai-success)/0.5);}

.empty{text-align:center;padding:54px 30px;}
.empty .ec{width:54px;height:54px;border-radius:14px;background:hsl(var(--surface-3));display:grid;place-items:center;margin:0 auto 16px;}
.empty .ec svg{width:24px;height:24px;color:hsl(var(--text-tertiary));}
.empty h3{font-size:16px;margin-bottom:6px;}
.empty p{font-size:13px;color:hsl(var(--text-tertiary));max-width:380px;margin:0 auto;}

.action-card{padding:18px 20px;border-radius:var(--radius);display:flex;gap:16px;align-items:flex-start;background:hsl(var(--surface-1)/0.7);border:1px solid hsl(var(--hairline)/0.5);box-shadow:var(--shadow-card);transition:.22s var(--ease);}
.action-card:hover{transform:translateY(-2px);}
.action-card.crit{border-color:hsl(var(--ai-red)/0.4);background:linear-gradient(145deg,hsl(var(--ai-red)/0.07),hsl(var(--surface-1)/0.7));}
.action-card.warn{border-color:hsl(var(--ai-amber)/0.32);}
.action-card.go{border-color:hsl(var(--ai-success)/0.3);}
.ac-ic{width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;}
.ac-ic svg{width:20px;height:20px;}
.ac-ic.red{background:hsl(var(--ai-red)/0.14);color:hsl(0 84% 66%);}
.ac-ic.amber{background:hsl(var(--ai-amber)/0.14);color:hsl(var(--ai-amber));}
.ac-ic.green{background:hsl(var(--ai-success)/0.14);color:hsl(var(--ai-success));}
.ac-ic.blue{background:hsl(var(--ai-blue)/0.14);color:hsl(var(--ai-blue));}
.ac-ic.gray{background:hsl(var(--surface-3));color:hsl(var(--text-tertiary));}
.ac-body{flex:1;min-width:0;}
.ac-kicker{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px;}
.ac-kicker.red{color:hsl(0 84% 66%);}
.ac-kicker.amber{color:hsl(var(--ai-amber));}
.ac-kicker.green{color:hsl(var(--ai-success));}
.ac-kicker.blue{color:hsl(var(--ai-blue));}
.ac-title{font-family:var(--font-display);font-weight:600;font-size:15.5px;letter-spacing:-0.012em;margin-bottom:4px;}
.ac-text{font-size:13px;color:hsl(var(--text-secondary));line-height:1.55;}
.ac-text b{color:hsl(var(--text-primary));font-weight:600;}
.ac-actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;}

.kv{display:flex;flex-direction:column;gap:3px;}
.kv .k{font-size:11px;color:hsl(var(--text-tertiary));font-weight:500;}
.kv .v{font-size:14px;font-weight:600;}

.overlay{position:fixed;inset:0;background:hsl(225 18% 4%/0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{width:100%;max-width:560px;background:hsl(var(--surface-1)/0.92);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border:1px solid hsl(var(--hairline)/0.7);border-radius:16px;box-shadow:inset 0 1px 0 hsl(var(--text-primary)/0.05),0 30px 80px hsl(225 18% 1%/0.7);animation:modalIn .46s var(--ease-reveal);}
.modal.wide{max-width:720px;}
.modal.xwide{max-width:860px;}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
.modal-head{display:flex;align-items:flex-start;gap:14px;padding:22px 24px;border-bottom:1px solid hsl(var(--hairline)/0.4);}
.modal-head h3{font-size:17px;}
.modal-body{padding:22px 24px;}
.modal-foot{padding:18px 24px;border-top:1px solid hsl(var(--hairline)/0.4);display:flex;gap:10px;justify-content:flex-end;background:hsl(var(--surface-2)/0.4);border-radius:0 0 16px 16px;}
.close-x{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;background:hsl(var(--surface-3));flex:none;}
.close-x:hover{background:hsl(var(--ai-red)/0.18);}
.close-x svg{width:16px;height:16px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px;}
.field label .opt{color:hsl(var(--text-tertiary));font-weight:400;font-size:11.5px;}
.field .hint{font-size:11.5px;color:hsl(var(--text-tertiary));margin-top:6px;}
.input,.select,textarea.input{width:100%;padding:10px 13px;border-radius:9px;background:hsl(var(--surface-2));border:1px solid hsl(var(--hairline)/0.6);color:hsl(var(--text-primary));font-size:13.5px;font-family:inherit;transition:.15s;}
.input:focus,.select:focus,textarea.input:focus{outline:none;border-color:hsl(var(--ai-red)/0.6);box-shadow:0 0 0 3px hsl(var(--ai-red)/0.12);}
.input::placeholder,textarea.input::placeholder{color:hsl(var(--text-tertiary));}
.inline-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.check{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;background:hsl(var(--surface-2)/0.6);border:1px solid hsl(var(--hairline)/0.5);font-size:13px;cursor:pointer;}
.check input{margin-top:2px;accent-color:hsl(var(--ai-red));width:16px;height:16px;}
.mini-detail{background:hsl(var(--surface-2)/0.5);border:1px solid hsl(var(--hairline)/0.4);border-radius:11px;padding:15px 17px;margin-bottom:20px;}

.tg{position:relative;width:38px;height:22px;border-radius:99px;background:hsl(var(--surface-3));border:1px solid hsl(var(--hairline)/0.6);transition:.2s;flex:none;cursor:pointer;}
.tg::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:99px;background:hsl(var(--text-tertiary));transition:.2s var(--ease);}
.tg.on{background:hsl(var(--ai-red)/0.85);border-color:hsl(var(--ai-red));}
.tg.on::after{left:18px;background:#fff;}

.notif-pop{position:absolute;top:48px;right:0;width:360px;background:hsl(var(--surface-1));border:1px solid hsl(var(--hairline)/0.7);border-radius:14px;box-shadow:0 24px 60px hsl(225 18% 1%/0.6);z-index:40;display:none;overflow:hidden;}
.notif-pop.open{display:block;animation:pop .18s var(--ease);}
.notif-row{display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid hsl(var(--hairline)/0.3);transition:background .15s;cursor:pointer;}
.notif-row:hover{background:hsl(var(--surface-2)/0.6);}
.notif-row .nd{width:8px;height:8px;border-radius:99px;margin-top:5px;flex:none;}

.matrix-row{display:grid;grid-template-columns:1.6fr repeat(4,72px) 110px;align-items:center;gap:8px;padding:13px 4px;border-bottom:1px solid hsl(var(--hairline)/0.28);}
.matrix-row.head{padding-top:4px;padding-bottom:10px;}
.matrix-row.head span{font-size:10.5px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:hsl(var(--text-tertiary));text-align:center;}
.matrix-row.head span:first-child{text-align:left;}
.cat-name{font-size:13px;font-weight:600;}
.cat-desc{font-size:11.5px;color:hsl(var(--text-tertiary));margin-top:2px;}
.matrix-cell{display:grid;place-items:center;}
.freq-sel{font-size:11.5px;padding:5px 8px;border-radius:7px;background:hsl(var(--surface-2));border:1px solid hsl(var(--hairline)/0.6);color:hsl(var(--text-secondary));}

.chan-card{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:11px;background:hsl(var(--surface-2)/0.5);border:1px solid hsl(var(--hairline)/0.5);}
.chan-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:hsl(var(--surface-3));flex:none;}
.chan-ic svg{width:18px;height:18px;}

.banner{display:flex;align-items:center;gap:13px;padding:14px 18px;border-radius:12px;font-size:13px;}
.banner.amber{background:hsl(var(--ai-amber)/0.1);border:1px solid hsl(var(--ai-amber)/0.3);}
.banner.green{background:hsl(var(--ai-success)/0.1);border:1px solid hsl(var(--ai-success)/0.3);}
.banner.blue{background:hsl(var(--ai-blue)/0.1);border:1px solid hsl(var(--ai-blue)/0.3);}
.banner svg{width:20px;height:20px;flex:none;}

.tabs{display:flex;gap:4px;padding:4px;background:hsl(var(--surface-2)/0.6);border-radius:11px;border:1px solid hsl(var(--hairline)/0.4);width:fit-content;}
.tab{padding:8px 15px;border-radius:8px;font-size:12.5px;font-weight:600;color:hsl(var(--text-tertiary));transition:.15s;cursor:pointer;}
.tab.active{background:hsl(var(--surface-3));color:hsl(var(--text-primary));box-shadow:var(--shadow-card);}
.tab:hover:not(.active){color:hsl(var(--text-secondary));}

/* segmented view toggle (cards | table) */
.seg{display:flex;gap:2px;padding:3px;background:hsl(var(--surface-2)/0.7);border-radius:9px;border:1px solid hsl(var(--hairline)/0.5);}
.seg-btn{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:7px;font-size:12px;font-weight:600;color:hsl(var(--text-tertiary));transition:.15s;}
.seg-btn svg{width:14px;height:14px;}
.seg-btn.active{background:hsl(var(--surface-3));color:hsl(var(--text-primary));box-shadow:var(--shadow-card);}

/* filter popover */
.filter-pop{margin-top:14px;padding:18px 20px;border-radius:12px;background:hsl(var(--surface-1)/0.8);border:1px solid hsl(var(--hairline)/0.5);box-shadow:var(--shadow-card);}
.filter-grp{margin-bottom:14px;}
.filter-grp .fl{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:hsl(var(--text-tertiary));margin-bottom:9px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.fchip{padding:6px 13px;border-radius:99px;font-size:12px;font-weight:600;background:hsl(var(--surface-2));border:1px solid hsl(var(--hairline)/0.6);color:hsl(var(--text-secondary));transition:.15s;cursor:pointer;}
.fchip.on{background:hsl(var(--ai-red)/0.15);border-color:hsl(var(--ai-red)/0.5);color:hsl(0 84% 70%);}

/* channel master chips */
.mchan{display:flex;align-items:center;gap:9px;padding:10px 16px;border-radius:11px;background:hsl(var(--surface-2)/0.6);border:1px solid hsl(var(--hairline)/0.6);font-size:13px;font-weight:600;color:hsl(var(--text-secondary));transition:.15s;cursor:pointer;}
.mchan svg{width:17px;height:17px;}
.mchan.on{background:hsl(var(--ai-red)/0.14);border-color:hsl(var(--ai-red)/0.55);color:hsl(0 84% 72%);}
.mchan .mcheck{width:18px;height:18px;border-radius:6px;border:1.5px solid hsl(var(--hairline));display:grid;place-items:center;}
.mchan.on .mcheck{background:hsl(var(--ai-red));border-color:hsl(var(--ai-red));}
.mchan .mcheck svg{width:12px;height:12px;color:#fff;opacity:0;}
.mchan.on .mcheck svg{opacity:1;}

/* payout method picker */
.pm-card{padding:15px 17px;border-radius:12px;background:hsl(var(--surface-2)/0.5);border:1px solid hsl(var(--hairline)/0.5);margin-bottom:12px;transition:.15s;}
.pm-card.on{border-color:hsl(var(--ai-red)/0.45);background:hsl(var(--ai-red)/0.05);}
.pm-head{display:flex;align-items:center;gap:12px;cursor:pointer;}
.pm-ic{width:36px;height:36px;border-radius:9px;background:hsl(var(--surface-3));display:grid;place-items:center;flex:none;}
.pm-ic svg{width:17px;height:17px;}
.pm-detail{margin-top:14px;padding-top:14px;border-top:1px solid hsl(var(--hairline)/0.35);display:none;}
.pm-card.on .pm-detail{display:block;}

/* chart */
.chart-wrap{background:hsl(var(--surface-2)/0.4);border:1px solid hsl(var(--hairline)/0.4);border-radius:12px;padding:16px;}
.chart-legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;}
.lg{display:flex;align-items:center;gap:7px;color:hsl(var(--text-secondary));}
.lg .ls{width:18px;height:0;border-top:2px solid currentColor;}
.lg .ls.dash{border-top-style:dashed;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:hsl(var(--surface-3));border:1px solid hsl(var(--ai-success)/0.4);padding:13px 20px;border-radius:12px;display:flex;align-items:center;gap:11px;font-size:13.5px;font-weight:500;box-shadow:0 18px 40px hsl(225 18% 1%/0.6);opacity:0;pointer-events:none;transition:.3s var(--ease);z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast svg{width:18px;height:18px;color:hsl(var(--ai-success));}
.mock-flag{position:fixed;bottom:14px;left:14px;z-index:50;font-size:10.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:hsl(var(--text-tertiary));background:hsl(var(--surface-2)/0.85);border:1px solid hsl(var(--hairline)/0.5);padding:6px 11px;border-radius:99px;backdrop-filter:blur(8px);}

/* payments drill-in affordance */
.pay-cta{font-size:11.5px;font-weight:600;color:hsl(var(--text-tertiary));margin-top:13px;display:flex;align-items:center;gap:5px;transition:color .18s var(--ease),gap .18s var(--ease);}
.card.interactive:hover .pay-cta{color:hsl(var(--ai-red));gap:8px;}

/* ===================== MOTION ===================== */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes sheetUp{from{transform:translateY(40px);opacity:.5;}to{transform:none;opacity:1;}}
@keyframes modalIn{from{opacity:0;transform:scale(.96);filter:blur(14px);}to{opacity:1;transform:none;filter:blur(0);}}
.cursor-dot{position:fixed;top:0;left:0;width:6px;height:6px;border-radius:99px;background:hsl(var(--ai-red));box-shadow:0 0 10px hsl(var(--ai-red)/0.8);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);opacity:0;transition:opacity .25s var(--ease);}
@media (pointer:coarse),(prefers-reduced-motion:reduce){.cursor-dot{display:none !important;}}
@media (prefers-reduced-motion:no-preference){
  .content.enter>*{animation:fadeUp .55s var(--ease-reveal) both;}
  .content.enter>*:nth-child(2){animation-delay:.05s;}
  .content.enter>*:nth-child(3){animation-delay:.10s;}
  .content.enter>*:nth-child(4){animation-delay:.15s;}
  .content.enter>*:nth-child(5){animation-delay:.20s;}
  .content.enter>*:nth-child(n+6){animation-delay:.24s;}
}

/* ===================== MOBILE ===================== */
.hamburger{display:none;width:38px;height:38px;border-radius:10px;place-items:center;background:hsl(var(--surface-2)/0.8);border:1px solid hsl(var(--hairline)/0.5);flex:none;}
.hamburger svg{width:19px;height:19px;}
.drawer-backdrop{display:none;position:fixed;inset:0;background:hsl(225 18% 2%/0.6);backdrop-filter:blur(4px);z-index:60;}
.drawer-backdrop.open{display:block;animation:fadeUp .2s var(--ease);}
.tabbar{display:none;}
@media(max-width:860px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:fixed;top:0;left:0;height:100dvh;z-index:70;width:268px;transform:translateX(-100%);transition:transform .3s var(--ease);}
  .sidebar.open{transform:none;box-shadow:0 0 70px hsl(225 18% 1%/0.7);}
  .hamburger{display:grid;}
  .content{padding:20px 16px 92px;}
  .topbar{padding:13px 16px;gap:12px;}
  .page-title{font-size:17px;}
  .pc-text{display:none;}
  .payout-chip{padding:9px;}
  .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:65;background:hsl(var(--ai-bg)/0.92);backdrop-filter:blur(18px) saturate(140%);border-top:1px solid hsl(var(--hairline)/0.5);padding:7px 6px calc(7px + env(safe-area-inset-bottom));justify-content:space-around;}
  .tabbar a{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 8px;border-radius:11px;color:hsl(var(--text-tertiary));font-size:9.5px;font-weight:600;flex:1;transition:color .15s;}
  .tabbar a svg{width:20px;height:20px;}
  .tabbar a.active{color:hsl(var(--ai-red));}
  .notif-pop{width:min(360px,calc(100vw - 28px));right:-8px;}
}
@media(max-width:760px){
  .seg{display:none;}
  /* tables collapse into stacked glass cards, never a horizontal scroll */
  .card:has(.tbl){background:none;border:none;box-shadow:none;backdrop-filter:none;padding:0;overflow:visible;}
  .tbl thead{display:none;}
  .tbl,.tbl tbody,.tbl tr,.tbl td{display:block;width:100%;}
  .tbl tr{background:hsl(var(--surface-1)/0.6);border:1px solid hsl(var(--hairline)/0.6);border-radius:var(--radius);padding:6px 16px;margin-bottom:10px;backdrop-filter:blur(14px) saturate(140%);box-shadow:var(--shadow-card);}
  .tbl tr:hover{background:hsl(var(--surface-1)/0.6);}
  .tbl td{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid hsl(var(--hairline)/0.25);text-align:right;}
  .tbl tr td:last-child{border-bottom:none;}
  .tbl td[data-label]::before{content:attr(data-label);font-family:var(--font-body);font-size:0.625rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:hsl(var(--text-tertiary));text-align:left;flex:none;}
  .tbl td:empty{display:none;}
  .card:has(.matrix-row){overflow-x:auto;}
  .matrix-row{min-width:560px;}
  .overlay{padding:0;align-items:flex-end;}
  .modal,.modal.wide,.modal.xwide{max-width:100%;max-height:92dvh;overflow-y:auto;border-radius:20px 20px 0 0;animation:sheetUp .3s var(--ease);}
  .modal-foot{position:sticky;bottom:0;}
  .inline-2{grid-template-columns:1fr;}
}

/* === Drifting ambient glow (the breathing background, like the site's AmbientGlow) === */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.ambient i{position:absolute;display:block;border-radius:50%;filter:blur(90px);will-change:transform;}
.ambient .g1{width:60vw;height:60vw;left:-12vw;top:-18vw;background:radial-gradient(circle,hsl(var(--ai-red-deep)/0.55),transparent 70%);animation:driftA 26s var(--ease) infinite alternate;}
.ambient .g2{width:52vw;height:52vw;right:-14vw;top:8vh;background:radial-gradient(circle,hsl(var(--ai-red)/0.14),transparent 70%);animation:driftB 34s var(--ease) infinite alternate;}
.ambient .g3{width:66vw;height:66vw;left:18vw;bottom:-30vw;background:radial-gradient(circle,hsl(var(--ai-red-deep)/0.42),transparent 70%);animation:driftC 42s var(--ease) infinite alternate;}
@keyframes driftA{from{transform:translate(0,0) scale(1)}to{transform:translate(8vw,6vh) scale(1.16)}}
@keyframes driftB{from{transform:translate(0,0) scale(1)}to{transform:translate(-7vw,5vh) scale(1.1)}}
@keyframes driftC{from{transform:translate(0,0) scale(1)}to{transform:translate(6vw,-6vh) scale(1.2)}}
.app{position:relative;z-index:1;}
@media (prefers-reduced-motion:reduce){.ambient i{animation:none!important;}}

/* === Scroll reveal: each block rises in once === */
.reveal{opacity:0;transform:translateY(22px);}
.reveal.revealed{opacity:1;transform:none;transition:opacity .7s var(--ease-reveal),transform .7s var(--ease-reveal);transition-delay:var(--rd,0ms);}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important;}}

/* === Card 3D tilt: faster transition while the pointer drives it === */
.card,.action-card{transform-style:preserve-3d;}
.card.tilting,.action-card.tilting{transition:transform .12s ease-out,border-color .3s var(--ease),box-shadow .3s var(--ease)!important;}
.card:hover,.action-card:hover{box-shadow:inset 0 1px 0 hsl(var(--text-primary)/0.06),0 16px 40px hsl(225 18% 2%/0.55),var(--shadow-glow-hover);}
.card:hover{border-color:hsl(var(--ai-red)/0.35);}

<body>
<!-- ops-specific component additions (everything else inherited from the shared design system above) -->
<style>
/* TOP-HEADER layout (overrides the inherited sidebar grid) */
.app{display:block;}
.sidebar{display:none!important;}
.topnav{position:sticky;top:0;z-index:45;display:flex;align-items:center;gap:6px;padding:0 24px;height:58px;background:hsl(var(--surface-1)/0.82);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border-bottom:1px solid hsl(var(--hairline)/0.5);}
.topnav .brand{padding:0;margin-right:10px;gap:9px;}

.topnav-items{display:flex;gap:2px;align-items:center;}
.topnav-item{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:9px;font-size:13px;font-weight:500;color:hsl(var(--text-secondary));position:relative;transition:.15s var(--ease);cursor:pointer;white-space:nowrap;}
.topnav-item:hover{background:hsl(var(--surface-3)/0.7);color:hsl(var(--text-primary));}

.topnav-item svg{width:16px;height:16px;opacity:.9;}
.topnav-item .nav-badge{position:static;margin-left:2px;}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:9px;}
.topbar{position:sticky;top:58px;z-index:30;}
.tbl.dense tbody td{padding:11px 14px;}
.win-cell{font-family:var(--font-mono);font-size:12px;text-align:center;}
.win-cell .wlab{display:block;font-size:9px;letter-spacing:0.06em;color:hsl(var(--text-tertiary));text-transform:uppercase;margin-bottom:2px;}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:hsl(var(--text-secondary));align-items:center;}
.legend span{display:inline-flex;align-items:center;}
.legend i{width:14px;height:0;border-top:2px solid currentColor;display:inline-block;margin-right:6px;}
.legend i.dot{width:9px;height:9px;border-top:none;border-radius:99px;background:currentColor;}
.legend i.dash{border-top-style:dashed;}
.def{font-size:11.5px;color:hsl(var(--text-tertiary));line-height:1.6;}

.srcbadge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:hsl(var(--text-tertiary));border:1px solid hsl(var(--hairline)/0.6);border-radius:99px;padding:3px 9px;}
.opsstat{padding:16px 18px;}
.opsstat .stat-val{font-size:24px;}
.miniprog{display:flex;align-items:center;gap:10px;}
.miniprog .bar{flex:1;}
.miniprog .pct{font-family:var(--font-mono);font-size:12px;font-weight:600;min-width:42px;text-align:right;}
.vrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid hsl(var(--hairline)/0.28);}
.vrow:last-child{border-bottom:none;}
.vbar{height:6px;border-radius:99px;background:hsl(var(--surface-3));overflow:hidden;position:relative;flex:1;max-width:160px;}
.vbar>span{position:absolute;left:0;top:0;bottom:0;border-radius:99px;background:linear-gradient(90deg,hsl(var(--ai-red)/0.7),hsl(var(--ai-red)));}
.chartcard{background:hsl(var(--surface-2)/0.4);border:1px solid hsl(var(--hairline)/0.4);border-radius:12px;padding:16px;}
.spark{display:inline-block;vertical-align:middle;}
.elig{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.elig.both{background:linear-gradient(145deg,hsl(var(--ai-amber)/0.16),hsl(var(--ai-success)/0.1));color:hsl(var(--ai-amber));border:1px solid hsl(var(--ai-amber)/0.3);}
.elig.t1{background:hsl(var(--ai-amber)/0.14);color:hsl(var(--ai-amber));border:1px solid hsl(var(--ai-amber)/0.3);}
.elig.std{background:hsl(var(--surface-3));color:hsl(var(--text-tertiary));border:1px solid hsl(var(--hairline)/0.5);}
.vcard{padding:18px 20px;}
.vcard h4{font-size:15px;}
.expander{cursor:pointer;}
.exprow{background:hsl(var(--surface-2)/0.4);}
.mtag{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;font-size:11px;font-weight:600;background:hsl(var(--surface-3));border:1px solid hsl(var(--hairline)/0.5);}
.gtag{font-size:10px;padding:2px 7px;border-radius:5px;background:hsl(var(--surface-3));color:hsl(var(--text-secondary));margin:0 3px 3px 0;display:inline-block;}
@media(max-width:920px){.topnav-items{display:none;}.topbar{top:58px;}}
/* unique + animated icons */
@media (prefers-reduced-motion:no-preference){
  .ic-anim svg{animation:icPulse 3.4s var(--ease) infinite;}
  .ac-ic.red.ic-anim svg{animation:icShake 4s var(--ease) infinite;}
  .ac-ic.green.ic-anim svg{animation:icBob 3s var(--ease) infinite;}

  .brand-mark{animation:brandGlow 4s var(--ease) infinite;}
  .nav-badge,.dot{animation:badgePulse 2.2s var(--ease) infinite;}
}
@keyframes icPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes icShake{0%,92%,100%{transform:rotate(0)}94%{transform:rotate(-9deg)}96%{transform:rotate(9deg)}98%{transform:rotate(-5deg)}}
@keyframes icBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes brandGlow{0%,100%{box-shadow:0 6px 14px hsl(var(--ai-red)/0.35)}50%{box-shadow:0 6px 22px hsl(var(--ai-red)/0.6)}}
@keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 hsl(var(--ai-red)/0.5)}70%{box-shadow:0 0 0 5px hsl(var(--ai-red)/0)}}
.opsstat .ac-ic{position:relative;overflow:visible;}
.opsstat .ac-ic::after{content:"";position:absolute;inset:-3px;border-radius:inherit;border:1px solid currentColor;opacity:0;transition:opacity .3s,transform .3s;}
.opsstat:hover .ac-ic::after{opacity:.4;transform:scale(1.15);}
/* per-icon animation variety */
@media (prefers-reduced-motion:no-preference){
  .ac-ic.amber.ic-anim svg{animation:icSpinwobble 5s var(--ease) infinite;}
  .ac-ic.blue.ic-anim svg{animation:icFloat 3.6s var(--ease) infinite;}
  .topbar .payout-chip svg{animation:icBob 2.8s var(--ease) infinite;}
}
@keyframes icSpinwobble{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes icFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.06)}}
/* modal stat cards — keep on-scale, never overflow the popup */
.modal .opsstat{padding:14px 14px;min-width:0;}
.modal .opsstat .stat-val{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal .opsstat .stat-label{font-size:0.62rem;letter-spacing:0.1em;}
.modal .opsstat .ac-ic{width:30px!important;height:30px!important;}
.modal .opsstat .ac-ic svg{width:15px;height:15px;}
@media(max-width:720px){.modal .g-4{grid-template-columns:repeat(2,1fr);}}
/* clean compact metric card for modals (uniform height, never overflows) */
.mgrid{display:grid;gap:10px;}
.mgrid.c4{grid-template-columns:repeat(4,1fr);}

const XDD={cbs:{}};
function xdd(id,current,opts,cb,o){o=o||{};XDD.cbs[id]=cb;const norm=opts.map(x=>Array.isArray(x)?x:[x,x]);const cur=norm.find(x=>String(x[0])===String(current));const lbl=cur?cur[1]:(o.placeholder||norm[0][1]);
  return `<div class="xdd" style="${o.flex?'display:block;flex:1;min-width:'+(o.min||'120px'):''}"><button type="button" class="xdd-btn ${current?'on':''}" onclick="xddToggle(this,event)" style="${o.w?'min-width:'+o.w+'px':''}"><span class="xdd-lbl">${lbl}</span><span class="xdd-car">${svg('chevron')}</span></button><div class="xdd-menu" ${o.menuw?`style="min-width:${o.menuw}px"`:''}>${norm.map(x=>`<div class="xdd-opt ${String(x[0])===String(current)?'sel':''}" data-v="${String(x[0]).replace(/"/g,'&quot;')}" onclick="xddPick(this,'${id}',event)">${x[1]}</div>`).join('')}</div></div>`;}

function xddPick(opt,id,e){e.stopPropagation();const w=opt.closest('.xdd');w.classList.remove('open');const lbl=w.querySelector('.xdd-lbl');if(lbl)lbl.textContent=opt.textContent;w.querySelector('.xdd-btn').classList.toggle('on',!!opt.dataset.v);const cb=XDD.cbs[id];if(cb)cb(opt.dataset.v);}

/* COVERART[campaignId] = Spotify album cover scraped from the track's public URL (Web API album.images[0].url).

   The data-URI SVGs below are MOCK stand-ins so you can see the cover-vs-initials behavior. */
function fakeCover(a,b){return 'data:image/svg+xml,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${a}"/><stop offset="1" stop-color="${b}"/></linearGradient></defs><rect width="80" height="80" fill="url(#g)"/><circle cx="40" cy="40" r="15" fill="rgba(0,0,0,0.4)"/><circle cx="40" cy="40" r="4.5" fill="rgba(255,255,255,0.7)"/></svg>`);}
const COVERART={'C-7001':fakeCover('#7c3aed','#ec4899'),'C-7005':fakeCover('#f43f5e','#a855f7'),'C-7011':fakeCover('#f97316','#ef4444'),'C-7012':fakeCover('#06b6d4','#10b981')};
function cover(seed,art,sz){const s=sz||46;const base=`width:${s}px;height:${s}px;border-radius:9px;font-size:${Math.round(s*0.32)}px;background:${COVERS[coverFor(seed)]}`;const img=COVERART[seed];
  if(img)return `<div class="cover" style="${base};overflow:hidden;position:relative"><span style="position:absolute;inset:0;display:grid;place-items:center">${initials(art)}</span><img src="${img}" alt="" loading="lazy" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.remove()"/></div>`;

/* CSV download — genuinely downloads a file */
function downloadCSV(filename,rows){const csv=rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),500);}

  const N=Math.max(...o.series.map(s=>s.data.length));
  const yMax=o.yMax||Math.max(1,...o.series.flatMap(s=>s.data.filter(v=>v!=null)))*1.1;
  const X=i=> padL + (N<=1?0:(i/(N-1))*iw);
  const Y=v=> padT + ih - (v/yMax)*ih;
  let grid='';
  for(let t=0;t<=4;t++){const gy=padT+ih-(t/4)*ih;const val=yMax*t/4;grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${w-padR}" y2="${gy.toFixed(1)}" stroke="hsl(var(--hairline))" stroke-opacity="0.3"/><text x="${padL-7}" y="${(gy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="hsl(var(--text-tertiary))" font-family="ui-monospace,monospace">${o.yFmt?o.yFmt(val):fmt(val)}</text>`;}
  let xl='';(o.xLabels||[]).forEach((lb,i,arr)=>{const idx=arr.length<=1?0:Math.round(i/(arr.length-1)*(N-1));xl+=`<text x="${X(idx).toFixed(1)}" y="${h-7}" text-anchor="middle" font-size="9" fill="hsl(var(--text-tertiary))">${lb}</text>`;});
  let paths='';
  o.series.forEach(s=>{
    const col=s.color||('hsl(var(--ai-'+s.c+'))');
    let d='',started=false,lastI=0;
    s.data.forEach((v,i)=>{if(v==null){started=false;return;}d+=`${started?'L':'M'}${X(i).toFixed(1)} ${Y(v).toFixed(1)} `;started=true;lastI=i;});
    if(s.fill && d){const firstI=s.data.findIndex(v=>v!=null);d+=`L${X(lastI).toFixed(1)} ${(padT+ih).toFixed(1)} L${X(firstI).toFixed(1)} ${(padT+ih).toFixed(1)} Z`;paths+=`<path d="${d}" fill="${s.color||('hsl(var(--ai-'+s.c+')/0.12)')}" ${s.color?'opacity="0.13"':''} stroke="none"/>`;}
    else paths+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="${s.sw||2}" ${s.dash?'stroke-dasharray="5 4"':''} stroke-linejoin="round" stroke-linecap="round"/>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;overflow:visible">${grid}${paths}${xl}</svg>`;
}
function sparkline(data,c){const w=120,h=30,max=Math.max(1,...data),X=i=>(i/(data.length-1))*w,Y=v=>h-2-(v/max)*(h-4);let d='';data.forEach((v,i)=>d+=`${i?'L':'M'}${X(i).toFixed(1)} ${Y(v).toFixed(1)} `);return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><path d="${d}" fill="none" stroke="hsl(var(--ai-${c}))" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function genSeries(base,n,vol,trend){const out=[];let v=base;for(let i=0;i<n;i++){v=Math.max(0,v+trend+(Math.sin(i*1.3)+Math.cos(i*0.6))*vol);out.push(Math.round(v));}return out;}

  <div class="grid g-4" style="margin:18px 0">

  <div class="card" style="padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <div style="position:relative;flex:1;min-width:220px"><input class="input" placeholder="Search vendors or campaigns" style="padding-left:36px"/><div style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:hsl(var(--text-tertiary))">${svg('search',2)}</div></div>
    <button class="btn btn-ghost btn-sm" onclick="payoutSel=new Set(payouts.filter(p=>p.unpaid>0).map(p=>p.vendor));render();toast('Selected all eligible')">Select all eligible</button>

  </div>
  <div class="card" style="overflow:hidden"><table class="tbl dense"><thead><tr><th style="width:34px"></th><th style="width:24px"></th><th>Vendor / Campaigns</th><th>Amount Owed</th><th>Amount Paid</th><th>Streams</th><th>Payment</th></tr></thead><tbody>
  ${payouts.map(p=>{

function markCampaignPaid(vendor,i){const p=payouts.find(x=>x.vendor===vendor);if(p&&p.detail[i]){p.detail[i].status='paid';p.unpaid=p.detail.filter(d=>d.status==='unpaid').length;p.paidCount=p.detail.filter(d=>d.status==='paid').length;toast(`Marked "${p.detail[i].c}" paid`);render();}}
function updatePayoutRate(vendor,i,val){const p=payouts.find(x=>x.vendor===vendor);if(p&&p.detail[i]){const r=Math.max(0,parseFloat(String(val).replace(/[^0-9.]/g,''))||0);p.detail[i].rate=r;p.detail[i].owed=p.detail[i].streams/1000*r;toast(`Rate updated to $${r}/1k · owed ${money2(p.detail[i].owed)}`);render();}}
function openPaymentDetail(vendor,kind){const p=payouts.find(x=>x.vendor===vendor);const list=p.detail.filter(d=>d.status===kind);openModal(`<div class="modal"><div class="modal-head"><div class="ac-ic ${kind==='paid'?'green':'amber'}" style="width:40px;height:40px">${svg(kind==='paid'?'check':'clock',2)}</div><div style="flex:1"><h3>${vendor} — ${kind==='paid'?'Paid':'Unpaid'} campaigns</h3><div class="muted" style="font-size:12px">${list.length} ${kind} · sample shown</div></div><button class="close-x" onclick="closeM()">${svg('x')}</button></div>
  <div class="modal-body"><table class="tbl dense"><thead><tr><th>Campaign</th><th style="text-align:right">Streams</th><th style="text-align:right">Amount</th></tr></thead><tbody>${list.map(d=>`<tr><td style="font-weight:600">${d.c}</td><td class="mono" style="text-align:right">${fmt(d.streams)}</td><td class="mono" style="text-align:right">${money2(d.owed||d.streams/1000*d.rate)}</td></tr>`).join('')||'<tr><td colspan="3" class="muted">None</td></tr>'}</tbody></table></div>
  <div class="modal-foot">${kind==='unpaid'&&list.length?`<button class="btn btn-primary btn-sm" onclick="closeM();markVendorAllPaid('${vendor}')">${svg('check')}Mark all paid</button>`:''}<button class="btn btn-ghost btn-sm" onclick="closeM()">Close</button></div></div>`);}
function markVendorAllPaid(vendor){const p=payouts.find(x=>x.vendor===vendor);p.detail.forEach(d=>d.status='paid');p.unpaid=0;p.paidCount=p.detail.length;toast(`All ${vendor} campaigns marked paid`);render();}
function processPayouts(){const n=payoutSel.size;const amt=payouts.filter(p=>payoutSel.has(p.vendor)).reduce((a,p)=>a+p.detail.filter(d=>d.status==='unpaid').reduce((x,d)=>x+d.owed,0),0);payouts.filter(p=>payoutSel.has(p.vendor)).forEach(p=>{p.detail.forEach(d=>d.status='paid');p.unpaid=0;p.paidCount=p.detail.length;});closeM();toast(`Processed ${money2(amt)} to ${n} vendor${n>1?'s':''} for Friday Jun 19`);payoutSel=new Set();render();}
function exportPayouts(){const rows=[['Vendor','Campaign','Streams','Rate','Owed','Status']];payouts.forEach(p=>p.detail.forEach(d=>rows.push([p.vendor,d.c,d.streams,'$'+d.rate+'/1k',d.owed,d.status])));downloadCSV('vendor_payouts.csv',rows);toast('Exported payouts to CSV');}
/* ---- vendor payout history (amounts tie to the payouts[] data) ---- */
const FRIDAYS=['Jun 12, 2026','Jun 5, 2026','May 29, 2026','May 22, 2026','May 15, 2026','May 8, 2026','May 1, 2026','Apr 24, 2026'];
function vendorPaid(name){const p=payouts.find(x=>x.vendor===name);return p?p.paid:0;}
function weeklyPaid(total,n){if(total<=0)return new Array(n).fill(0);const w=[];let s=0;for(let i=0;i<n;i++){const x=0.45+Math.abs(Math.sin(i*1.3+1.1));w.push(x);s+=x;}const out=w.map(x=>Math.round(total*x/s));out[0]+=total-out.reduce((a,b)=>a+b,0);return out;}
function openPayoutHistory(vendorName){const n=8;
  const total=vendorName?vendorPaid(vendorName):payouts.reduce((a,p)=>a+p.paid,0);
  const series=weeklyPaid(total,n); // index 0 = most recent (FRIDAYS[0])
  const chartData=[...series].reverse(); // oldest→newest for the chart
  const rows=series.map((amt,i)=>({date:FRIDAYS[i],amt,batches:vendorName?1:payouts.filter(p=>p.paid>0).length}));
  const avg=total/n;window._phData={name:vendorName||'all',rows};
  openModal(`<div class="modal wide"><div class="modal-head"><div class="ac-ic green" style="width:42px;height:42px">${svg('ledger',2)}</div><div style="flex:1"><div class="eyebrow" style="margin-bottom:2px">Payout history</div><h3>${vendorName||'All vendors'}</h3><div class="muted" style="font-size:12px">Friday cycle · trailing ${n} weeks</div></div><button class="close-x" onclick="closeM()">${svg('x')}</button></div>
  <div class="modal-body">
    <div class="mgrid c3" style="margin-bottom:16px">${mstat('Paid to date',money(total),'green',svg('wallet'),'matches payouts ledger')}${mstat('Avg / Friday',money(avg),'blue',svg('dollar'),'trailing '+n+'w')}${mstat('Last batch',money(series[0]),'amber',svg('clock'),FRIDAYS[0])}</div>
    <div class="chartcard" style="margin-bottom:16px"><div style="font-weight:600;font-size:13.5px;margin-bottom:6px">Amount paid per Friday batch</div>${total>0?lineChart({h:200,series:[{data:chartData,c:'success',fill:true},{data:chartData,c:'success'}],xLabels:['8w','6w','4w','2w','now'],yFmt:v=>'$'+fmt(v)}):`<div class="empty" style="padding:24px"><div class="ec">${svg('chart')}</div><h3>No payouts yet</h3><p>${vendorName||'No vendor'} has no completed, paid campaigns.</p></div>`}</div>
    ${vendorName?'':`<div class="sec-head" style="margin:4px 0 10px"><h2 data-eyebrow="lifetime by vendor" style="font-size:14px">Paid by vendor</h2><div class="line"></div></div>
    <div class="card" style="overflow:hidden;margin-bottom:16px"><table class="tbl dense"><thead><tr><th>Vendor</th><th style="text-align:right">Paid to date</th><th style="text-align:right">Owed now</th><th></th></tr></thead><tbody>${[...payouts].sort((a,b)=>b.paid-a.paid).map(p=>`<tr class="clickable" onclick="openPayoutHistory('${p.vendor.replace(/'/g,'')}')"><td style="font-weight:600">${p.vendor}</td><td class="mono" style="text-align:right;color:hsl(var(--ai-success))">${money2(p.paid)}</td><td class="mono" style="text-align:right;color:${p.detail.filter(d=>d.status==='unpaid').reduce((a,d)=>a+d.owed,0)>0?'hsl(var(--ai-red))':'inherit'}">${money2(p.detail.filter(d=>d.status==='unpaid').reduce((a,d)=>a+d.owed,0))}</td><td style="text-align:right"><span class="muted" style="font-size:11px">history ${svg('ext',2).replace('<svg','<svg style="width:11px;height:11px;display:inline;vertical-align:-1px"')}</span></td></tr>`).join('')}</tbody></table></div>`}
    <div class="sec-head" style="margin:4px 0 10px"><h2 data-eyebrow="batches" style="font-size:14px">Friday batches</h2><div class="line"></div></div>
    <div class="card" style="overflow:hidden"><table class="tbl dense"><thead><tr><th>Friday</th><th style="text-align:right">Amount paid</th><th style="text-align:right">${vendorName?'Status':'Vendors'}</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.date}</td><td class="mono" style="text-align:right;color:hsl(var(--ai-success))">${money2(r.amt)}</td><td style="text-align:right">${vendorName?'<span class="pill green" style="font-size:9px"><span class="pdot"></span>Paid</span>':'<span class="mono">'+r.batches+'</span>'}</td></tr>`).join('')}</tbody></table></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="exportPayoutHist()">${svg('export')}Export</button><button class="btn btn-primary btn-sm" onclick="closeM()">Close</button></div></div>`);
}
function exportPayoutHist(){const d=window._phData;if(!d)return;downloadCSV('payout_history_'+d.name.replace(/[^a-z0-9]/gi,'_')+'.csv',[['Friday','Amount paid'],...d.rows.map(r=>[r.date,r.amt])]);toast('Exported payout history');}

  <div class="def" style="margin-top:16px">Vendors only ever see <b>remaining to allocate</b>, never client budget, margin, or competing offers. Tier eligibility is set per vendor in <a onclick="go('vendors')" style="color:hsl(var(--ai-red));cursor:pointer">Vendors & Playlists</a>.</div>`;

function plSelect(key,label,opts){const norm=[['',label],...opts.map(o=>Array.isArray(o)?o:[o,o])];return xdd('pf-'+key,plFilters[key],norm,v=>{plFilters[key]=v;render();},{w:140,placeholder:label});}
function plTh(key,label,align){const on=plSort.key===key;return `<th style="cursor:pointer;${align?'text-align:'+align:''};white-space:nowrap" onclick="plSortBy('${key}')">${label} <span style="opacity:${on?1:0.3}">${on?(plSort.dir>0?'▲':'▼'):'↕'}</span></th>`;}
function plSortBy(key){if(plSort.key===key)plSort.dir*=-1;else{plSort.key=key;plSort.dir=1;}render();}
function plFiltered(){let list=playlistsCat.filter(p=>(!plFilters.genre||p.genres.includes(plFilters.genre))&&(!plFilters.vendor||p.vendor===plFilters.vendor)&&(!plFilters.country||(p.countries||[]).some(c=>c[0]===plFilters.country)));
  if(plSort.key){const val=p=>({name:p.name.toLowerCase(),vendor:p.vendor.toLowerCase(),followers:p.followers,daily:p.daily}[plSort.key]);list=[...list].sort((a,b)=>{const x=val(a),y=val(b);return (x>y?1:x<y?-1:0)*plSort.dir;});}
  return list;}
PAGES.vendors = () => {

      <button class="btn btn-primary btn-sm" onclick="openEditVendor(null)">${svg('plus')}Add Vendor</button>
    </div></div>`;

/* accurate world map — real country geometry (Natural Earth via world-atlas TopoJSON), equirectangular */
/* country code -> ISO-3166 numeric id used by world-atlas (normalized, no leading zeros) */
const CODE_ID={US:'840',CA:'124',BR:'76',UK:'826',GB:'826',ES:'724',DE:'276',FR:'250',IT:'380',NL:'528',PT:'620',AU:'36'};

const W_W=1000,W_H=420; // equirectangular clipped to ±84° lat so Antarctica doesn't dominate
const LAT_MAX=84;
function geoXY(lng,lat){return [(lng+180)/360*W_W,(LAT_MAX-Math.max(-LAT_MAX,Math.min(LAT_MAX,lat)))/(LAT_MAX*2)*W_H];}
function geoToPath(geom){if(!geom)return '';const polys=geom.type==='Polygon'?[geom.coordinates]:geom.type==='MultiPolygon'?geom.coordinates:[];let d='';
  for(const poly of polys)for(const ring of poly){for(let i=0;i<ring.length;i++){const xy=geoXY(ring[i][0],ring[i][1]);d+=(i?'L':'M')+xy[0].toFixed(1)+' '+xy[1].toFixed(1)+' ';}d+='Z';}return d;}
let WORLD_GEO=null, WORLD_STATE='idle'; // idle|loading|ready|failed
function loadWorld(){if(WORLD_GEO||WORLD_STATE==='loading')return;WORLD_STATE='loading';
  const build=()=>fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json()).then(topo=>{
    const feats=topojson.feature(topo,topo.objects.countries).features.filter(f=>f.id!=='010'); // drop Antarctica
    WORLD_GEO=feats.map(f=>({id:nid(f.id),d:geoToPath(f.geometry)})).filter(c=>c.d);WORLD_STATE='ready';
    if(route==='intel'&&intelTab==='territory'&&terrView==='heat')render();
  }).catch(()=>{WORLD_STATE='failed';if(route==='intel')render();});
  if(window.topojson)build();
  else{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';s.onload=build;s.onerror=()=>{WORLD_STATE='failed';if(route==='intel')render();};document.head.appendChild(s);}
}
function shadeFor(share,maxShare){const f=share/maxShare;return `hsl(0 ${(62+f*22).toFixed(0)}% ${(26+f*30).toFixed(0)}%)`;} // dark red (low) -> bright red (high)
function territoryWorldMap(){
  if(!WORLD_GEO)loadWorld();
  const maxShare=Math.max(...territoryData.map(t=>t.share)),minShare=Math.min(...territoryData.map(t=>t.share));
  const shareById={},codeById={};territoryData.forEach(t=>{const id=CODE_ID[t.country];if(id){shareById[id]=t.share;codeById[id]=t.country;}});
  let grat='';for(let lat=-60;lat<=60;lat+=30){const y=geoXY(0,lat)[1].toFixed(1);grat+=`<line x1="0" y1="${y}" x2="${W_W}" y2="${y}" stroke="hsl(var(--hairline))" stroke-opacity="0.08"/>`;}
  for(let lng=-150;lng<=150;lng+=30){const x=geoXY(lng,0)[0].toFixed(1);grat+=`<line x1="${x}" y1="0" x2="${x}" y2="${W_H}" stroke="hsl(var(--hairline))" stroke-opacity="0.08"/>`;}
  const land=WORLD_GEO?WORLD_GEO.map(c=>{const sh=shareById[c.id];
    if(sh!=null)return `<path d="${c.d}" fill="${shadeFor(sh,maxShare)}" stroke="hsl(0 84% 72%)" stroke-width="0.7" stroke-opacity="0.85" style="cursor:pointer" onclick="openTerritory('${codeById[c.id]}')"><title>${codeById[c.id]} · ${sh}% of streams</title></path>`;
    return `<path d="${c.d}" fill="url(#landg)" stroke="hsl(225 14% 30%)" stroke-width="0.5" stroke-opacity="0.7"/>`;}).join(''):'';
  const status=WORLD_GEO?'':WORLD_STATE==='failed'?`<text x="${W_W/2}" y="${W_H/2}" text-anchor="middle" font-size="13" fill="hsl(var(--text-tertiary))">Map geometry needs a connection</text>`:`<text x="${W_W/2}" y="${W_H/2}" text-anchor="middle" font-size="13" fill="hsl(var(--text-tertiary))">Loading world map…</text>`;
  const legend=`<div style="margin-left:auto;display:flex;gap:8px;align-items:center"><span class="muted" style="font-size:11px">${minShare}%</span><span style="width:120px;height:9px;border-radius:5px;background:linear-gradient(90deg,${shadeFor(minShare,maxShare)},${shadeFor(maxShare,maxShare)})"></span><span class="muted" style="font-size:11px">${maxShare}%</span></div>`;
  return `<div class="card" style="padding:18px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap"><div style="font-weight:600;font-size:14px">Global stream share</div><span class="muted" style="font-size:11px">darker → brighter red = higher share · click a country</span>${legend}</div>
  <div style="position:relative;background:radial-gradient(ellipse 90% 80% at 50% 45%, hsl(210 55% 12%/0.5), hsl(225 24% 6%)),linear-gradient(180deg,hsl(225 24% 7%),hsl(225 26% 5%));border:1px solid hsl(var(--hairline)/0.4);border-radius:14px;overflow:hidden">
  <svg viewBox="0 0 ${W_W} ${W_H}" width="100%" style="display:block">
    <defs><linearGradient id="landg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="hsl(225 14% 22%)"/><stop offset="1" stop-color="hsl(225 17% 14%)"/></linearGradient></defs>
    ${grat}${land}${status}
  </svg></div></div>`;
}
function openTerritory(cc){const t=territoryData.find(x=>x.country===cc);if(!t)return;
  openModal(`<div class="modal"><div class="modal-head"><div style="font-size:30px;line-height:1">${t.flag}</div><div style="flex:1"><div class="eyebrow" style="margin-bottom:2px">Territory</div><h3>${t.country}</h3><div class="muted" style="font-size:12px">${t.share}% of total streams · ${t.streams}</div></div><button class="close-x" onclick="closeM()">${svg('x')}</button></div>
  <div class="modal-body"><div class="mgrid c2" style="margin-bottom:14px">${mstat('Stream share',t.share+'%','red',svg('trend'),'of network total')}${mstat('Streams',t.streams,'blue',svg('music'),'12-month')}</div>
    <div class="sec-head" style="margin:4px 0 10px"><h2 data-eyebrow="driving this market" style="font-size:14px">Top playlists</h2><div class="line"></div></div>
    ${t.top.map(p=>`<div class="notif-row" style="border-radius:9px" onclick="closeM();openPlaylistHistory('${p.replace(/'/g,'')}')"><div class="ac-ic red" style="width:28px;height:28px;border-radius:8px">${svg('music',2).replace('<svg','<svg style="width:14px;height:14px"')}</div><div style="flex:1;font-weight:600;font-size:13px">${p}</div><span class="muted" style="font-size:11px">history ${svg('ext',2).replace('<svg','<svg style="width:11px;height:11px;display:inline;vertical-align:-1px"')}</span></div>`).join('')}
  </div>
  <div class="modal-foot"><button class="btn btn-primary btn-sm" onclick="closeM()">Back to map</button></div></div>`);
}
function territoryHeatmap(){
  const cols=[...new Set(playlistsCat.flatMap(p=>(p.countries||[]).map(c=>c[0])))];
  const cell=(p,cc)=>{const m=(p.countries||[]).find(c=>c[0]===cc);const v=m?m[1]:0;const op=v/65;return `<td style="text-align:center;padding:0"><div title="${p.name} · ${cc} ${v}%" onclick="openPlaylistHistory('${p.name.replace(/'/g,'')}')" style="cursor:pointer;margin:2px;height:30px;border-radius:6px;display:grid;place-items:center;font-size:10px;font-family:var(--font-mono);background:hsl(var(--ai-red)/${(op*0.85).toFixed(2)});color:${v>30?'#fff':'hsl(var(--text-tertiary))'}">${v?v:''}</div></td>`;};
  return `<div class="card" style="overflow-x:auto;padding:14px"><table class="tbl" style="font-size:11px"><thead><tr><th style="min-width:160px">Playlist</th>${cols.map(cc=>`<th style="text-align:center">${FLAG[cc]||''}<br>${cc}</th>`).join('')}</tr></thead><tbody>
  ${playlistsCat.map(p=>`<tr><td style="font-weight:600;font-size:12px">${p.name}</td>${cols.map(cc=>cell(p,cc)).join('')}</tr>`).join('')}
  </tbody></table><div class="muted" style="font-size:11px;margin-top:8px">Cell = % of that playlist's plays from that country. Darker red = higher concentration.</div></div>`;
}
let pwTab='all';
function openPlaylistWeight(i){const p=playlistWeight[i];
  // campaigns running this playlist (match by vendor + genre, fallback to a couple)
  let camps=campaigns.filter(c=>c.vendors.some(v=>v.name===p.vendor));
  if(!camps.length)camps=campaigns.slice(0,3);
  const cat=playlistsCat.find(x=>x.name===p.pl);const countries=cat?cat.countries:[['US',42],['UK',16],['DE',11]];
  const filt=camps.filter(c=>pwTab==='all'?true:pwTab==='active'?(c.status==='active'||c.status==='flagged'):c.status==='completed'||c.delivered>=c.goal);
  openModal(`<div class="modal wide"><div class="modal-head"><div class="ac-ic green" style="width:42px;height:42px">${svg('spark',2)}</div><div style="flex:1"><div class="eyebrow" style="margin-bottom:2px">Algorithmic weight #${i+1}</div><h3>${p.pl}</h3><div class="muted" style="font-size:12px">${p.vendor} · score ${p.score} · A-Norm ${p.anorm}×</div></div><button class="close-x" onclick="closeM()">${svg('x')}</button></div>
  <div class="modal-body">
    <div class="grid g-2" style="gap:14px;margin-bottom:16px">
      <div class="mini-detail" style="margin:0"><div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Genres</div>${p.genres.length?p.genres.map(g=>`<span class="gtag">${g}</span>`).join(''):'<span class="muted">—</span>'}</div>
      <div class="mini-detail" style="margin:0"><div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Top territories</div>${countries.map(c=>`<span class="mtag" style="padding:2px 7px;font-size:11px">${FLAG[c[0]]||''} ${c[0]} ${c[1]}%</span>`).join(' ')}</div>
    </div>
    <div class="sec-head" style="margin:4px 0 12px"><h2 data-eyebrow="campaigns using this playlist" style="font-size:15px">Campaigns</h2><div style="flex:1"></div><div class="seg"><button class="seg-btn ${pwTab==='all'?'active':''}" onclick="pwTab='all';openPlaylistWeight(${i})">All</button><button class="seg-btn ${pwTab==='active'?'active':''}" onclick="pwTab='active';openPlaylistWeight(${i})">Active</button><button class="seg-btn ${pwTab==='completed'?'active':''}" onclick="pwTab='completed';openPlaylistWeight(${i})">Completed</button></div></div>
    <div class="card" style="overflow:hidden"><table class="tbl dense"><thead><tr><th>Campaign</th><th>Progress</th><th>Pace</th></tr></thead><tbody>
    ${filt.length?filt.map(c=>{const pct=Math.min(100,Math.round(c.delivered/c.goal*100));return `<tr class="clickable" onclick="closeM();openCampaign('${c.id}')"><td style="font-weight:600">${c.artist} - ${c.song}</td><td style="min-width:130px"><div class="miniprog">${bar(pct,PACE[c.pace].fill)}<span class="pct">${pct}%</span></div></td><td>${pill(PACE,c.pace)}</td></tr>`;}).join(''):`<tr><td colspan="3" class="muted" style="padding:18px">No ${pwTab} campaigns on this playlist.</td></tr>`}
    </tbody></table></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeM();openPlaylistHistory('${p.pl.replace(/'/g,'')}')">${svg('chart')}Performance history</button><button class="btn btn-primary btn-sm" onclick="closeM()">Close</button></div></div>`);
}
function intelPerf(){
  const list=campaigns.filter(c=>c.delivered>0).sort((a,b)=>(b.delivered/b.goal)-(a.delivered/a.goal));
  const hit=campaigns.filter(c=>c.delivered>=c.goal).length;
  return `<div class="grid g-4" style="margin-bottom:18px">${stat('Goal hit rate','53%','blue',svg('check'),'244 / 459 campaigns')}${stat('On pace','72%','green',svg('target'),'332 on pace to timeframe')}${stat('Total delivered','30.6M','red',svg('music'))}${stat('Active','172','blue',svg('zap'))}</div>
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:18px"><div style="padding:18px 20px 4px"><h3 style="font-size:16px">Goal vs Actual Delivery</h3><p class="muted" style="font-size:12px">Stream goal tracking, pacing and hit rate across campaigns.</p></div>
    <table class="tbl dense"><thead><tr><th>Campaign</th><th style="text-align:right">Goal</th><th style="text-align:right">Actual</th><th>Progress</th><th>Pace</th></tr></thead><tbody>
    ${list.map(c=>{const pct=Math.round(c.delivered/c.goal*100);return `<tr class="clickable" onclick="openCampaign('${c.id}')"><td style="font-weight:600">${c.artist} - ${c.song}</td><td class="mono" style="text-align:right">${fmt(c.goal)}</td><td class="mono" style="text-align:right">${fmt(c.delivered)}</td><td style="min-width:150px"><div class="miniprog">${bar(Math.min(100,pct),pct>=100?'fill-green':pct>=50?'fill-amber':'fill-red')}<span class="pct">${pct}%</span></div></td><td>${pill(PACE,c.pace)}</td></tr>`;}).join('')}
    </tbody></table></div>
  <div class="card" style="padding:20px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">${svg('alert',2).replace('<svg','<svg style="width:18px;height:18px;color:hsl(var(--ai-amber))"')}<h3 style="font-size:15px">Pacing Alerts</h3></div>
    ${campaigns.filter(c=>c.pace==='critical').map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid hsl(var(--hairline)/0.28)"><div style="flex:1"><div style="font-weight:600;font-size:13px">${c.artist} - ${c.song}</div><div class="muted" style="font-size:11.5px">Delivering ${c.expected?Math.round(c.delivered/c.expected*100):0}% of expected (${fmt(c.delivered)} of ${fmt(c.expected||c.goal)})</div></div><span class="pill red" style="font-size:9px">critical</span><button class="btn btn-ghost btn-sm" onclick="openCampaign('${c.id}')">Open</button></div>`).join('')}
  </div>`;
}
function intelOpt(){
  const sugg=campaigns.filter(c=>c.pace==='critical'||c.pace==='behind').map(c=>{
    const v=c.vendors.find(x=>isVConf(x));const ratePct=c.expected?Math.round(c.delivered/c.expected*100):0;
    let action;
    if(!c.vendors.length) action=`No vendors assigned — pitch to ${c.tier==='t1'?'Tier 1':'Standard'} vendors immediately.`;
    else if(v) action=`Vendor <b>${v.name}</b> is at ${ratePct}% of expected. Add a backup ${c.tier==='t1'?'Tier 1':'Standard'} vendor or reassign — its playlists aren't converting.`;
    else action=`Vendors approved but none confirmed/delivering. Confirm a vendor and start, or re-pitch.`;
    return {c,action,ratePct};
  });
  return `<p class="muted" style="font-size:12.5px;margin-bottom:16px">Generated from pacing + vendor data. Each suggestion names the <b>specific vendor/action</b>, not a generic prompt.</p>
  <div class="grid" style="gap:12px">${sugg.map(s=>`<div class="card" style="padding:16px 18px;border-left:3px solid hsl(var(--ai-red)/0.55)"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px"><span style="font-weight:700">${s.c.artist} - ${s.c.song}</span>${tierBadge(s.c.tier)}<span class="pill red" style="font-size:9px">Pacing risk</span><span class="muted" style="font-size:11px">${s.ratePct}% of expected</span></div><div style="display:flex;gap:10px;align-items:flex-start"><div style="color:hsl(var(--ai-amber))">${svg('spark',2).replace('<svg','<svg style="width:16px;height:16px"')}</div><div style="flex:1;font-size:13px;line-height:1.5">${s.action}</div></div><div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="openCampaign('${s.c.id}')">${svg('zap')}Open Campaign</button><button class="btn btn-ghost btn-sm" onclick="openAddPlaylist('${s.c.id}')">${svg('plus')}Add Vendor</button></div></div>`).join('')}</div>`;
}

let cmTab='details', cmId=null, perfMetrics=new Set(['streams','pop','saves','listeners','ratio']);
function openCampaign(id){cmTab='details';cmId=id;renderCampaign();}
function setCmTab(t){cmTab=t;renderCampaign();}
function renderCampaign(){
  const c=getC(cmId);if(!c)return;
  const labels={details:'Details',playlists:'Playlists',performance:'Performance',payments:'Vendor Payments',bounty:'Bounty Board'};
  const tabs=['details','playlists','performance','payments','bounty'].map(t=>`<span class="tab ${cmTab===t?'active':''}" onclick="setCmTab('${t}')">${labels[t]}</span>`).join('');
  const body=cmTab==='details'?cmDetails(c):cmTab==='playlists'?cmPlaylists(c):cmTab==='performance'?cmPerformance(c):cmTab==='bounty'?cmBounty(c):cmPayments(c);
  openModal(`<div class="modal xwide"><div class="modal-head">${cover(c.id,c.artist,42)}<div style="flex:1"><h3 style="display:flex;align-items:center;gap:8px">${c.artist} - ${c.song} ${tierBadge(c.tier)}</h3><div class="muted" style="font-size:12.5px">${c.client} · ${pill(PACE,c.pace)}</div></div><button class="close-x" onclick="closeM()">${svg('x')}</button></div><div class="modal-body"><div class="tabs" style="margin-bottom:20px;flex-wrap:wrap">${tabs}</div>${body}</div></div>`);
}
function cmDetails(c){return `
  <div class="grid g-2" style="gap:14px;margin-bottom:18px"><div class="kv"><span class="k">Client</span><span class="v">${c.client}</span></div><div class="kv"><span class="k">Budget</span><span class="v mono">${money(c.budget)}</span></div><div class="kv"><span class="k">Stream goal</span><span class="v mono">${fmt(c.goal)}</span></div><div class="kv"><span class="k">Remaining</span><span class="v mono">${fmt(Math.max(0,c.goal-c.delivered))}</span></div><div class="kv"><span class="k">Campaign type</span><span class="v">${tierBadge(c.tier)}</span></div><div class="kv"><span class="k">Genre</span><span class="v">${c.genre}</span></div><div class="kv"><span class="k">Start · Duration</span><span class="v">${c.start} · ${c.duration}d</span></div><div class="kv"><span class="k">Salesperson</span><span class="v">${c.salesperson}</span></div></div>
  <div class="mini-detail"><div class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Track</div>${c.track?`<a class="song-link" href="${c.track}" target="_blank" rel="noopener" style="font-size:13px;word-break:break-all">${c.track} ${svg('ext',2)}</a>`:`<span class="muted">No track URL on file</span>`}<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap"><a class="btn btn-ghost btn-sm" href="${spURL(c.artist+' '+c.song)}" target="_blank" rel="noopener">${svg('ext')}Spotify for Artists</a><span class="pill ${c.pop>40?'green':c.pop>0?'amber':'gray'}">Popularity ${c.pop}/100</span><span class="pill ${c.sfa?'green':'amber'}"><span class="pdot"></span>${c.sfa?'SFA linked':'No SFA access'}</span></div></div>
  ${vendorWorkflow(c)}
  ${c.status!=='active'?`<div class="banner blue" style="margin-top:14px">${svg('shop',2)}<div style="flex:1;font-size:12.5px"><b>Marketplace:</b> <b>${getBids(c).filter(b=>b.status==='open'||b.status==='countered').length} open bid(s)</b> from eligible vendors. Accept a bid (or confirm a vendor above) and it shows here as <b>Confirmed</b> — that's how you see which allocations went through.</div><button class="btn btn-ghost btn-sm" onclick="setCmTab('bounty')">${svg('target')}View Bids</button></div>`:''}
  ${c.alert?`<div class="banner amber" style="margin-top:14px">${svg('alert',2)}<div style="font-size:12.5px"><b>Alert:</b> ${c.alert}</div></div>`:''}
  <div class="banner amber" style="margin-top:14px">${svg('msg',2)}<div style="flex:1;font-size:12.5px"><b>Client relationship issue?</b> Flag this campaign so the assigned salesperson follows up.</div><button class="btn btn-ghost btn-sm" onclick="toast('Flagged for sales attention')">Flag for Sales</button></div>
  <div class="modal-foot" style="margin:18px -24px -22px;border-radius:0 0 16px 16px">${c.status==='active'?`<button class="btn btn-ghost btn-sm" onclick="openAddPlaylist('${c.id}')">${svg('plus')}Add Playlists</button>`:`<button class="btn btn-ghost btn-sm" onclick="setCmTab('bounty')">${svg('shop')}Marketplace Bids</button>`}<button class="btn btn-primary btn-sm" onclick="closeM()">Close</button></div>`;}
function markVendorPaidOnCampaign(cid,vname){const c=getC(cid);const v=c.vendors.find(x=>x.name===vname);if(v){v.paid=true;toast(`${vname} marked paid on ${c.artist} - ${c.song}`);renderCampaign();}}
/* ---- approve → confirm → start workflow ---- */
function isVConf(v){return v.status==='confirmed'||v.status==='accepted';}
const VWMAP={pending:{pill:'amber',label:'Submitted'},approved:{pill:'blue',label:'Approved'},confirmed:{pill:'green',label:'Confirmed'},accepted:{pill:'green',label:'Confirmed'},rejected:{pill:'red',label:'Rejected'}};
function approveVendor(cid,vname){const v=getC(cid).vendors.find(x=>x.name===vname);if(v){v.status='approved';toast(`${vname} approved — set allocation, then confirm`);renderCampaign();}}
function confirmVendor(cid,vname){const v=getC(cid).vendors.find(x=>x.name===vname);if(v){if(!v.allocated){toast('Set an allocation before confirming');return;}v.status='confirmed';toast(`${vname} confirmed — locked in`);renderCampaign();}}
function rejectVendor(cid,vname){const v=getC(cid).vendors.find(x=>x.name===vname);if(v){v.status='rejected';toast(`${vname} rejected`);renderCampaign();}}
function setVendorAlloc(cid,vname,val){const v=getC(cid).vendors.find(x=>x.name===vname);if(v){v.allocated=Math.max(0,parseInt(String(val).replace(/[^0-9]/g,''))||0);renderCampaign();}}
function eligVendorBadge(vname,tier){const vd=vendorByName(vname);if(!vd)return '';const ok=tier==='t1'?vd.elig.t1:vd.elig.std;return ok?'':`<span class="pill red" style="font-size:9px" title="Not eligible for ${tier==='t1'?'Tier 1':'Standard'} campaigns">not ${tier==='t1'?'T1':'Std'} eligible</span>`;}
function vendorWorkflow(c){
  if(!c.vendors.length) return `<div class="sec-head" style="margin:8px 0 12px"><h2 data-eyebrow="approve → confirm → start" style="font-size:15px">Vendor Allocation (0)</h2><button class="btn btn-ghost btn-sm" onclick="openAddVendorToCampaign('${c.id}')">${svg('plus')}Add vendor</button><div class="line"></div></div><div class="card" style="padding:18px"><div class="muted" style="font-size:13px">No vendors assigned yet. ${c.status==='active'?'<b style="color:hsl(var(--ai-red))">This is why delivery is at 0.</b> ':''}Add a vendor + allocation directly, or pitch to ${c.tier==='t1'?'Tier 1':'Standard'} vendors.</div><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary btn-sm" onclick="openAddVendorToCampaign('${c.id}')">${svg('plus')}Add Vendor & Allocate</button><button class="btn btn-ghost btn-sm" onclick="setCmTab('bounty')">${svg('shop')}Post to Marketplace</button></div></div>`;
  const conf=c.vendors.filter(isVConf);const confAlloc=conf.reduce((a,v)=>a+v.allocated,0);
  const pct=c.goal?Math.round(confAlloc/c.goal*100):0;const started=c.status!=='submission';
  const pend=c.vendors.filter(v=>v.status==='pending').length;
