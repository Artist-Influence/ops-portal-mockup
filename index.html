function cmPerformance(c){
  const ahead=c.pace==='ahead'||c.pace==='onpace';
  const dur=c.duration,day=Math.min(c.dayOf,dur);
  // pacing series
  const N=dur+1;const actual=[],required=[],projected=[],goalLine=[];
  for(let i=0;i<N;i++){goalLine.push(c.goal);if(i<=day){actual.push(Math.round(c.delivered*Math.pow(day?i/day:0,0.92)));}else actual.push(null);required.push(i<day?null:Math.round(c.delivered+(c.goal-c.delivered)*((i-day)/Math.max(1,N-1-day))));projected.push(i<day?null:Math.round(c.delivered+((c.proj||c.goal)-c.delivered)*((i-day)/Math.max(1,N-1-day))));}
  const yMax=Math.max(c.goal,c.proj||0,c.delivered)*1.12||100;
  const pacing=c.delivered>0?lineChart({h:240,yMax,xLabels:['Day 0','Day '+Math.round(dur/4),'Day '+Math.round(dur/2),'Day '+Math.round(dur*3/4),'Day '+dur],series:[{data:goalLine,c:'success',dash:true,sw:1.5},{data:required,c:'amber',dash:true},{data:projected,c:'blue',dash:true},{data:actual,c:'red',fill:true},{data:actual,c:'red'}]}):`<div class="empty" style="padding:30px"><div class="ec">${svg('chart')}</div><h3>No delivery yet</h3><p>This campaign has 0 streams so far, so there's no pacing curve to plot. The goal line and required pace appear once a vendor starts delivering.</p></div>`;
  // combined metrics — DAILY values over the elapsed window. Each metric has a distinct shape
  // (lag/phase) and is normalized to its own peak, so all five lines stay visible and on-scale.
  const E=Math.max(6,day+1);
  const mk=(peak,phase,lag)=>{const a=[];for(let i=0;i<E;i++){const t=i/(E-1);const ramp=Math.min(1,Math.max(0,(t-(lag||0))/(1-(lag||0))));const wig=0.80+0.20*Math.sin(i*0.85+phase);a.push(Math.max(0,peak*Math.pow(ramp,0.85)*wig));}return a;};
  const dStreams=mk(Math.max(1,c.curDaily||c.delivered/E),0.0,0.03);
  const dListen=mk(Math.max(1,(c.listeners||1)/E*1.7),1.3,0.10);
  const dSaves=mk(Math.max(1,(c.saves||1)/E*2.0),2.6,0.30);
  const dPop=[];const ps=Math.max(0,(c.pop||0)-16);for(let i=0;i<E;i++)dPop.push(ps+((c.pop||0)-ps)*(i/(E-1)));
  const dRatio=dStreams.map((s,i)=>s/Math.max(0.001,dListen[i]));
  const norm=a=>{const m=Math.max(0.0001,...a);return a.map(v=>v/m*100);};
  const ratioNow=c.listeners?(c.d28/Math.max(1,c.listeners)).toFixed(2):'—';
  const xl=['Day 0','Day '+Math.round(day/4),'Day '+Math.round(day/2),'Day '+Math.round(day*3/4),'Day '+day];
  const METRICS=[{k:'streams',label:'Streams',color:'hsl(var(--ai-red))',data:dStreams,now:fmt(c.delivered)},{k:'pop',label:'Popularity',color:'#22c55e',data:dPop,now:(c.pop||0)+'/100'},{k:'saves',label:'Saves',color:'hsl(var(--ai-amber))',data:dSaves,now:fmt(c.saves||0)},{k:'listeners',label:'Listeners',color:'hsl(var(--ai-blue))',data:dListen,now:fmt(c.listeners||0)},{k:'ratio',label:'Streams / listener',color:'#a855f7',data:dRatio,now:ratioNow}];
  const onMetrics=METRICS.filter(m=>perfMetrics.has(m.k));
  const combinedChart=c.delivered>0?lineChart({h:240,yMax:108,yFmt:v=>Math.round(v)+'%',xLabels:xl,series:onMetrics.map(m=>({data:norm(m.data),color:m.color,sw:2}))}):`<div class="empty" style="padding:24px"><div class="ec">${svg('chart')}</div><h3>No data yet</h3><p>Metrics plot here once delivery begins.</p></div>`;
  const metricChips=METRICS.map(m=>`<span class="fchip ${perfMetrics.has(m.k)?'on':''}" onclick="togglePerfMetric('${m.k}')"><span style="width:9px;height:9px;border-radius:99px;display:inline-block;background:${m.color};margin-right:6px;vertical-align:0"></span>${m.label} · <b class="mono">${m.now}</b></span>`).join('');
  return `
  <div class="card" style="padding:18px 20px;margin-bottom:16px;border-color:hsl(var(--ai-${ahead?'success':'red'})/0.4);background:linear-gradient(145deg,hsl(var(--ai-${ahead?'success':'red'})/0.06),hsl(var(--surface-1)/0.7))"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:8px"><div class="ac-ic ${ahead?'green':'red'}" style="width:32px;height:32px">${svg(ahead?'check':'alert',2)}</div><div><div style="font-weight:700;font-size:15px;color:hsl(var(--ai-${ahead?'success':'red'}))">${ahead?'Ahead of Pace':'Behind Pace'}</div><div class="muted" style="font-size:12px">Projected ${fmt(c.proj||0)} streams by end (goal ${fmt(c.goal)})</div></div></div><div class="mono muted" style="font-size:12px">Day ${c.dayOf} of ${c.duration}</div></div></div>
  <div class="grid g-4" style="margin-bottom:16px">${stat('Delivered',fmt(c.delivered),'red',svg('music'),`${paceProgress(c)}% of goal`)}${stat('Current daily',fmt(c.curDaily||0),'blue',svg('zap'),`required ${fmt(c.reqDaily||0)}/day`)}${stat('Remaining',fmt(Math.max(0,c.goal-c.delivered)),'amber',svg('target'),`${Math.max(0,c.duration-c.dayOf)} days left`)}${stat('Projected at end',fmt(c.proj||0),ahead?'green':'red',svg('trend'))}</div>
  <div class="chartcard" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div style="font-weight:600;font-size:13.5px">Campaign Pacing — ${dur}-day timeline</div></div>${pacing}<div class="legend" style="margin-top:8px"><span style="color:hsl(var(--ai-red))"><i></i>Actual</span><span style="color:hsl(var(--ai-amber))"><i class="dash"></i>Required pace</span><span style="color:hsl(var(--ai-blue))"><i class="dash"></i>Projected</span><span style="color:hsl(var(--ai-success))"><i class="dash"></i>Goal</span></div></div>
  <div class="chartcard" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px"><div style="font-weight:600;font-size:13.5px">Streams, popularity, saves, listeners & streams/listener</div><span class="muted" style="font-size:10.5px">each line normalized to its own peak (0-100%) so different scales share one graph · toggle below</span></div><div class="chips" style="margin-bottom:14px">${metricChips}</div>${combinedChart}</div>
  <div class="banner blue">${svg('spark',2)}<div style="flex:1;font-size:12.5px"><b>Priority 8:</b> popularity, saves, listener-to-stream ratio and playlist adds are pulled from Spotify and tracked over time, separating direct vendor delivery from algorithmic/organic movement. After completion, monthly refreshes continue for 6 months to flag renewals.</div></div>
  <div class="modal-foot" style="margin:18px -24px -22px;border-radius:0 0 16px 16px"><button class="btn btn-primary btn-sm" onclick="closeM()">Close</button></div>`;
}

  if(!pls.length){const genres=v.genres.length?v.genres:['house'];const cs=[[['US',46],['UK',17],['DE',10]],[['US',39],['BR',15],['ES',12]],[['US',52],['CA',14],['AU',9]]];pls=Array.from({length:Math.min(3,Math.max(1,Math.round(v.playlists/8)||2))},(_,i)=>({name:`${v.name} Mix ${i+1}`,vendor:v.name,genres:[genres[i%genres.length]],followers:Math.round(v.followers/(i+2)),daily:Math.round(v.maxDaily/(i+2)/4),cost1k:v.cost1k,url:i%2===0,countries:cs[i%3]}));}
  return pls;}

    </tbody></table></div>
    <div class="def">Top countries are parsed by <a onclick="closeM();intelTab='territory';go('intel')" style="color:hsl(var(--ai-red));cursor:pointer">Intelligence → Territory</a> from each playlist's listener geography.</div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeM();openAddPlaylist(null)">${svg('plus')}Add playlist</button><button class="btn btn-primary btn-sm" onclick="closeM()">Close</button></div></div>`);

function openVendorCredits(filterName){const names=Object.keys(vendorCredits).filter(n=>!filterName||n===filterName);const log=clawbackLog.filter(l=>!filterName||l.vendor===filterName);const totalS=names.reduce((a,n)=>a+vc(n).streams,0),totalA=names.reduce((a,n)=>a+vc(n).amount,0);
  openModal(`<div class="modal wide"><div class="modal-head"><div class="ac-ic amber" style="width:42px;height:42px">${svg('ledger',2)}</div><div style="flex:1"><div class="eyebrow" style="margin-bottom:2px">Vendor clawback credits</div><h3>${filterName||'All vendors'}</h3><div class="muted" style="font-size:12px">Streams reclaimed from underperformers, redeployable to hit goals on time</div></div><button class="close-x" onclick="closeM()">${svg('x')}</button></div>
  <div class="modal-body">
    <div class="mgrid c3" style="margin-bottom:16px">${mstat('Credit balance',fmt(totalS),'amber',svg('undo'),'streams')}${mstat('Dollar value',money2(totalA),'green',svg('dollar'),'at vendor rates')}${mstat('Clawback events',String(log.length),'blue',svg('scissors'),'logged')}</div>
    <div class="banner blue" style="margin-bottom:16px">${svg('spark',2)}<div style="flex:1;font-size:12.5px">When a vendor says they can't hit a goal on time (or we see they won't and it's unfixed), we <b>clawback</b> streams here. The credit can be re-deployed to the marketplace or another vendor to still hit the client's goal.</div></div>
    <div class="sec-head" style="margin:4px 0 12px"><h2 data-eyebrow="balances" style="font-size:15px">Per-vendor balances</h2><div class="line"></div></div>
    ${names.filter(n=>vc(n).streams>0).length?names.filter(n=>vc(n).streams>0).map(n=>`<div class="card" style="padding:12px 16px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div class="avatar" style="width:28px;height:28px;font-size:11px">${initials(n)}</div><span style="font-weight:600">${n}</span><span class="pill amber" style="font-size:9px"><span class="pdot"></span>${fmt(vc(n).streams)} streams · ${money2(vc(n).amount)}</span><div style="margin-left:auto;display:flex;gap:6px"><button class="btn btn-primary btn-sm" onclick="openApplyCredit('${n.replace(/'/g,'')}')">${svg('undo')}Re-allocate to campaign</button></div></div></div>`).join(''):`<div class="card" style="padding:16px"><div class="muted" style="font-size:13px">No open clawback credits. They appear when you reduce a vendor's allocation.</div></div>`}
    <div class="sec-head" style="margin:14px 0 12px"><h2 data-eyebrow="history" style="font-size:15px">Clawback Ledger</h2><span class="count">${log.length}</span><div class="line"></div></div>
    <div class="card" style="overflow:hidden"><table class="tbl dense"><thead><tr><th>Date</th><th>Vendor</th><th>Campaign</th><th style="text-align:right">Streams</th><th style="text-align:right">Value</th><th>Sent to</th></tr></thead><tbody>
    ${log.length?log.map(l=>`<tr><td class="muted" style="font-size:11.5px">${l.date}</td><td style="font-weight:600">${l.vendor}</td><td style="font-size:12px">${l.campaign}</td><td class="mono" style="text-align:right;color:hsl(var(--ai-red))">-${fmt(l.streams)}</td><td class="mono" style="text-align:right">${money2(l.amount)}</td><td><span class="mtag">${l.dest}</span></td></tr>`).join(''):'<tr><td colspan="6" class="muted" style="padding:16px">No clawbacks yet.</td></tr>'}
    </tbody></table></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="toast('Exported clawback ledger')">${svg('export')}Export</button><button class="btn btn-primary btn-sm" onclick="closeM()">Close</button></div></div>`);
}
/* ---- vendor communication bridge (everything the vendor sees on their end) ---- */
const bridgeLog=[
  {vendor:'Glenn',type:'Clawback notice',msg:'30,000 streams reclaimed on J. Worra - Backseat (behind pace)',date:'Jun 14, 2026',ack:false},
  {vendor:'Moon',type:'Clawback notice',msg:'8,000 streams reclaimed on Harel - Look Twice (flagged delay)',date:'Jun 10, 2026',ack:true},

function bridgeNotify(vendor,type,msg){bridgeLog.unshift({vendor,type,msg,date:'Jun 18, 2026',ack:false});}
/* ---- Apply credit to a campaign ---- */
let acCampId='';
function openApplyCredit(name){const cr=vc(name);const vd=vendorByName(name);
  const elig=campaigns.filter(c=>['active','flagged','submission'].includes(c.status)&&(!vd||(c.tier==='t1'?vd.elig.t1:vd.elig.std)));
  acCampId=elig[0]?elig[0].id:'';
  if(!elig.length){openModal(`<div class="modal"><div class="modal-head"><div class="ac-ic amber" style="width:42px;height:42px">${svg('undo',2)}</div><div style="flex:1"><h3>Re-allocate credit — ${name}</h3></div><button class="close-x" onclick="openVendorCredits(null)">${svg('x')}</button></div><div class="modal-body"><div class="empty" style="padding:24px"><div class="ec">${svg('inbox')}</div><h3>No open campaign for ${name} yet</h3><p>The <b>${fmt(cr.streams)}-stream credit stays on the books</b> until there's a campaign to re-allocate it to. Create a new campaign, or it auto-offers when you next add ${name} to one (the credit is applied for you).</p></div></div><div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="openVendorCredits(null)">Back</button><button class="btn btn-primary btn-sm" onclick="closeM();openCreateCampaign()">${svg('plus')}New campaign</button></div></div>`);return;}
  openModal(`<div class="modal"><div class="modal-head"><div class="ac-ic green" style="width:42px;height:42px">${svg('undo',2)}</div><div style="flex:1"><h3>Apply credit — ${name}</h3><div class="muted" style="font-size:12.5px">Balance ${fmt(cr.streams)} streams · ${money2(cr.amount)}</div></div><button class="close-x" onclick="openVendorCredits(null)">${svg('x')}</button></div>
  <div class="modal-body">
    <div class="banner blue" style="margin-bottom:14px">${svg('spark',2)}<div style="flex:1;font-size:12.5px">The vendor makes good on streams they owe us: we add coverage to a live campaign from their credit (no new cost), and the balance drops.</div></div>
    <div class="field"><label>Apply to campaign</label>${xdd('acCamp',acCampId,elig.map(c=>[c.id,c.artist+' - '+c.song+' · '+fmt(Math.max(0,c.goal-c.delivered))+' remaining']),v=>{acCampId=v;acCreditCalc(name);},{w:'100%',flex:true,min:'260px'})}</div>
    <div class="inline-2"><div class="field"><label>Streams to apply</label><input class="input" id="acStreams" value="${Math.min(cr.streams,Math.max(0,(elig[0].goal-elig[0].delivered)))||cr.streams}" oninput="acCreditCalc('${name.replace(/'/g,'')}')"/></div><div class="field"><label>Credit left after</label><input class="input" id="acLeft" disabled style="opacity:.7"/></div></div>
    <label class="check"><input type="checkbox" id="acNotify" checked/><span>Notify ${name} in their dashboard</span></label>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="openVendorCredits(null)">Back</button><button class="btn btn-primary btn-sm" onclick="applyCreditToCampaign('${name.replace(/'/g,'')}')">${svg('check')}Apply credit</button></div></div>`);
  acCreditCalc(name);
}
function acCreditCalc(name){const cr=vc(name);const inp=document.getElementById('acStreams');let raw=parseInt((inp.value||'').replace(/[^0-9]/g,''))||0;const amt=Math.min(cr.streams,raw);if(raw>cr.streams)inp.value=cr.streams;const l=document.getElementById('acLeft');if(l)l.value=fmt(cr.streams-amt)+' streams';}
function applyCreditToCampaign(name){const cr=vc(name);const c=getC(acCampId);if(!c){openVendorCredits(null);return;}const amt=Math.min(cr.streams,parseInt((document.getElementById('acStreams').value||'').replace(/[^0-9]/g,''))||0);if(!amt){toast('Enter streams to apply');return;}
  const vd=vendorByName(name);const rate=vd?vd.cost1k:8;vendorCredits[name]={streams:cr.streams-amt,amount:Math.max(0,cr.amount-amt/1000*rate)};
  let v=c.vendors.find(x=>x.name===name);if(v){v.status='confirmed';v.allocated+=amt;}else c.vendors.push({name,status:'confirmed',allocated:amt,rate,paid:false,pls:[]});
  clawbackLog.unshift({vendor:name,streams:-amt,amount:-amt/1000*rate,campaign:c.artist+' - '+c.song,reason:'Credit applied to campaign',dest:'Applied',date:'Jun 18, 2026'});
  if(document.getElementById('acNotify').checked)bridgeNotify(name,'Credit applied',`${fmt(amt)} of your credit was applied to ${c.artist} - ${c.song}`);
  toast(`Applied ${fmt(amt)} credit → ${name} now covers it on ${c.artist} - ${c.song}`);openVendorCredits(null);
}
/* ===================== VENDOR MERGE ===================== */
let mergeSel=new Set();
function openMerge(){
  mergeSel=new Set();
  const cands=vendors.filter(v=>v.dupes);
  openModal(`<div class="modal wide"><div class="modal-head"><div class="ac-ic amber" style="width:42px;height:42px">${svg('merge',2)}</div><div style="flex:1"><h3>Merge duplicate vendors</h3><div class="muted" style="font-size:12.5px">${RAW_ROWS} raw rows fold into ${vendors.length} vendors. These have duplicate raw rows.</div></div><button class="close-x" onclick="closeM()">${svg('x')}</button></div>
  <div class="modal-body"><div class="banner amber" style="margin-bottom:16px">${svg('alert',2)}<div style="flex:1;font-size:12.5px">Duplicate vendor identities leak into every per-vendor metric (e.g. "Whale Music" appears 3×). Pick a canonical vendor and merge its raw rows so streams, payouts and reliability roll up correctly.</div></div>
    ${cands.map(v=>`<div class="card" style="padding:14px 16px;margin-bottom:10px"><label class="check" style="border:none;background:none;padding:0"><input type="checkbox" ${mergeSel.has(v.id)?'checked':''} onclick="toggleMerge('${v.id}')"/><div style="flex:1"><div style="font-weight:600;display:flex;align-items:center;gap:8px">${v.name}<span class="pill amber" style="font-size:9px">${v.dupes} raw rows</span></div><div class="muted" style="font-size:11.5px;margin-top:3px">Raw: ${v.raw.join(' · ')} → merge into <b>${v.name}</b> (${v.activeCampaigns} campaigns, ${fmt(v.followers)} followers)</div></div></label></div>`).join('')}
    <div class="def" style="margin-top:8px">After merge, all campaigns, playlists, payouts and streams for the duplicate rows attach to the single canonical vendor id. This cannot be undone in the mockup.</div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeM()">Cancel</button><button class="btn btn-primary btn-sm" onclick="doMerge()">${svg('merge')}Merge selected</button></div></div>`);
}
function toggleMerge(id){mergeSel.has(id)?mergeSel.delete(id):mergeSel.add(id);}
function doMerge(){if(!mergeSel.size){toast('Select at least one vendor to merge');return;}let folded=0;vendors.forEach(v=>{if(mergeSel.has(v.id)){folded+=(v.dupes-1);v.raw=[v.name];delete v.dupes;}});closeM();toast(`Merged ${folded} duplicate row${folded!==1?'s':''} into canonical vendors`);render();}

  {dot:'amber',title:'Stale campaign',body:'TYPHON - FLO has run 350 days at 0%.',time:'1d ago',go:"openCampaign('C-7010')"},
];
function toggleNotif(e){e.stopPropagation();const pop=document.getElementById('notifPop');if(!pop.innerHTML){pop.innerHTML=`<div style="padding:14px 16px;border-bottom:1px solid hsl(var(--hairline)/0.4);display:flex;align-items:center;justify-content:space-between"><span style="font-weight:700;font-size:13.5px">Alerts</span><span class="muted" style="font-size:11.5px">Mark all read</span></div>`+notifs.map(n=>`<div class="notif-row" onclick="closeNotif();${n.go}"><div class="nd" style="background:hsl(var(--ai-${n.dot==='green'?'success':n.dot==='red'?'red':'amber'}))"></div><div style="flex:1"><div style="font-weight:600;font-size:12.5px">${n.title}</div><div class="muted" style="font-size:11.5px;margin-top:1px">${n.body}</div><div class="muted" style="font-size:10.5px;margin-top:3px">${n.time}</div></div></div>`).join('')+`<div style="padding:11px 16px;text-align:center;font-size:12px;font-weight:600;color:hsl(var(--ai-red));cursor:pointer" onclick="closeNotif();go('today')">View all in Today</div>`;}pop.classList.toggle('open');}
function closeNotif(){const p=document.getElementById('notifPop');p.classList.remove('open');p.innerHTML='';}
document.addEventListener('click',()=>closeNotif());
let toastT;function toast(msg){document.getElementById('toastMsg').textContent=msg;const t=document.getElementById('toast');t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}

/* tilt + reveal + cursor */
const _coarse=window.matchMedia('(pointer:coarse)').matches,_reduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
function applyTilt(scope){if(_coarse||_reduced)return;(scope||document).querySelectorAll('.card,.action-card').forEach(card=>{if(card._tilt)return;card._tilt=true;card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();const px=(e.clientX-r.left)/r.width-0.5,py=(e.clientY-r.top)/r.height-0.5;card.classList.add('tilting');card.style.transform=`perspective(900px) rotateX(${(-py*4.5).toFixed(2)}deg) rotateY(${(px*4.5).toFixed(2)}deg) translateY(-2px)`;});card.addEventListener('mouseleave',()=>{card.classList.remove('tilting');card.style.transform='';});});}
let _revObs=null;
function revealOnScroll(scope){const root=scope||document.getElementById('view');if(!root||_reduced)return;if(!_revObs){_revObs=new IntersectionObserver((es)=>{es.forEach(en=>{if(en.isIntersecting){en.target.classList.add('revealed');_revObs.unobserve(en.target);}});},{threshold:0.06,rootMargin:'0px 0px -30px 0px'});}[...root.children].filter(el=>el.nodeType===1).forEach((el,i)=>{el.classList.add('reveal');el.style.setProperty('--rd',Math.min(i,8)*55+'ms');_revObs.observe(el);});}
function enhanceView(){const v=document.getElementById('view');if(!v)return;applyTilt(v);revealOnScroll(v);}
(function(){if(window.matchMedia('(pointer:fine)').matches&&!_reduced){const dot=document.createElement('div');dot.className='cursor-dot';document.body.appendChild(dot);window.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';dot.style.opacity='1';});window.addEventListener('mouseout',()=>{dot.style.opacity='0';});}})();
let wasMobile=isMobile();window.addEventListener('resize',()=>{const m=isMobile();if(m!==wasMobile){wasMobile=m;render();}});
render();
</script>
